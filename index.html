<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>TUMIX — Доставка с душой</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23F15A2C'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold' font-size='18'>T</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(20, 20, 40, 0.6);
      border-radius: 16px;
      margin: 8px;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.4);
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #F15A2C, #ff8a5c, #F15A2C);
      border-radius: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      box-shadow: 0 0 12px rgba(241,90,44,0.5);
      transition: all 0.4s ease;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #ff7043, #ffaa80, #ff7043);
      box-shadow: 0 0 20px rgba(241,90,44,0.8);
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #06060f;
      background-image: 
        radial-gradient(ellipse at 20% 30%, rgba(241, 90, 44, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 60%, rgba(255, 160, 80, 0.09) 0%, transparent 60%),
        radial-gradient(ellipse at 40% 85%, rgba(140, 100, 255, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 15%, rgba(255, 200, 150, 0.05) 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e8e4f0;
      animation: backgroundShift 20s ease infinite alternate;
    }

    @keyframes backgroundShift {
      0% { background-position: 0% 0%, 100% 100%, 50% 50%, 0% 100%; }
      100% { background-position: 100% 100%, 0% 0%, 50% 50%, 100% 0%; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-25px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(241, 90, 44, 0.6); }
      50% { box-shadow: 0 0 0 20px rgba(241, 90, 44, 0); }
    }
    @keyframes shimmer {
      0% { background-position: -300% center; }
      100% { background-position: 300% center; }
    }
    @keyframes borderGlow {
      0%, 100% { border-color: rgba(241, 90, 44, 0.2); box-shadow: 0 0 15px rgba(241,90,44,0.05); }
      50% { border-color: rgba(241, 90, 44, 0.7); box-shadow: 0 0 30px rgba(241,90,44,0.2); }
    }
    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .app-wrapper {
      width: 100%;
      max-width: 1460px;
      min-height: 94vh;
      background: rgba(14, 14, 28, 0.82);
      backdrop-filter: blur(36px);
      -webkit-backdrop-filter: blur(36px);
      border-radius: 48px;
      border: 1.5px solid rgba(255, 255, 255, 0.09);
      box-shadow: 
        0 50px 100px rgba(0, 0, 0, 0.8),
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 -1px 0 rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1), borderGlow 6s infinite;
    }

    .logo-header {
      padding: 20px 36px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(10, 10, 22, 0.3);
    }
    .logo-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-img {
      height: 44px;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(241,90,44,0.4));
      transition: transform 0.3s ease;
    }
    .logo-img:hover {
      transform: scale(1.08) rotate(-3deg);
    }
    .logo-text {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.8px;
      background: linear-gradient(135deg, #f5dfc8, #c8b098, #f5dfc8, #e0c8a8);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
      text-shadow: 0 0 30px rgba(241,90,44,0.15);
    }
    .logout-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.18);
      color: #c8bca8;
      padding: 12px 26px;
      border-radius: 34px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.35s ease;
      backdrop-filter: blur(10px);
      letter-spacing: 0.4px;
    }
    .logout-btn:hover {
      background: #c0392b;
      color: white;
      border-color: #e74c3c;
      box-shadow: 0 10px 28px rgba(192, 57, 43, 0.5);
      transform: translateY(-2px);
    }

    .auth-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 24px;
      animation: fadeInUp 0.6s ease;
    }
    .auth-tabs {
      display: flex;
      gap: 8px;
      background: rgba(255, 255, 255, 0.04);
      padding: 7px;
      border-radius: 28px;
      margin-bottom: 38px;
      backdrop-filter: blur(14px);
    }
    .auth-tab {
      padding: 13px 36px;
      border-radius: 24px;
      border: none;
      background: transparent;
      color: #9c90ac;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.35s ease;
      letter-spacing: 0.3px;
    }
    .auth-tab.active {
      background: #F15A2C;
      color: #fff;
      box-shadow: 0 12px 30px rgba(241, 90, 44, 0.6);
      transform: scale(1.05);
    }
    .auth-tab:hover:not(.active) {
      color: #d0c0b0;
      background: rgba(255,255,255,0.03);
    }

    .auth-card, .form-card {
      background: rgba(20, 20, 38, 0.78);
      backdrop-filter: blur(28px);
      border-radius: 40px;
      padding: 42px 38px;
      width: 100%;
      max-width: 560px;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 40px 70px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.04);
      animation: cardFloat 6s ease-in-out infinite;
    }
    .auth-card h2, .form-card h3 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 30px;
      text-align: center;
      color: #efe6da;
      letter-spacing: -0.3px;
    }

    .input-column {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .field-group label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #b8a8c8;
    }
    .field-group input,
    .field-group textarea,
    .field-group select {
      width: 100%;
      padding: 16px 22px;
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid rgba(255, 255, 255, 0.13);
      border-radius: 20px;
      font-size: 16px;
      color: #f2e8dc;
      outline: none;
      transition: all 0.35s ease;
      font-family: inherit;
      resize: vertical;
    }
    .field-group input:focus,
    .field-group textarea:focus {
      border-color: #F15A2C;
      box-shadow: 0 0 0 6px rgba(241, 90, 44, 0.3);
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }
    .field-group textarea {
      min-height: 120px;
      line-height: 1.5;
    }

    .btn {
      padding: 17px 28px;
      border-radius: 22px;
      border: none;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.35s ease;
      letter-spacing: 0.6px;
      width: 100%;
      margin-top: 14px;
      position: relative;
      overflow: hidden;
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.6s ease;
    }
    .btn:hover::before {
      left: 100%;
    }
    .btn-primary {
      background: linear-gradient(135deg, #F15A2C, #e04820);
      color: white;
      box-shadow: 0 16px 36px rgba(241, 90, 44, 0.55);
    }
    .btn-primary:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 48px rgba(241, 90, 44, 0.7);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.25);
      color: #d4cadc;
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.05);
      border-color: #F15A2C;
      color: #F15A2C;
    }
    .btn-danger {
      background: linear-gradient(135deg, #c0392b, #a93226);
      color: white;
      box-shadow: 0 10px 24px rgba(192,57,43,0.4);
    }
    .btn-danger:hover {
      box-shadow: 0 16px 34px rgba(192,57,43,0.6);
      transform: translateY(-2px);
    }
    .link-text {
      text-align: center;
      margin-top: 20px;
      font-size: 15px;
      color: #988ea8;
    }
    .link-text a {
      color: #F15A2C;
      text-decoration: none;
      font-weight: 700;
      transition: color 0.3s;
    }
    .link-text a:hover {
      color: #ff9f7c;
      text-decoration: underline;
    }

    .toast-notification {
      position: fixed;
      top: 28px;
      right: 28px;
      background: rgba(18, 18, 36, 0.95);
      backdrop-filter: blur(24px);
      border: 1.5px solid #F15A2C;
      border-radius: 22px;
      padding: 20px 32px;
      color: #f2e6d8;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 24px 50px rgba(0,0,0,0.7), 0 0 30px rgba(241,90,44,0.3);
      z-index: 9999;
      animation: fadeSlideDown 0.5s ease;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Красивые модальные окна */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      animation: fadeInUp 0.3s ease;
    }
    .modal-window {
      background: rgba(22,22,40,0.95);
      border: 1.5px solid rgba(241,90,44,0.4);
      border-radius: 28px;
      padding: 32px;
      min-width: 380px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
    }
    .modal-window h3 {
      margin-bottom: 20px;
      color: #efe6da;
    }
    .modal-window input, .modal-window select {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      color: white;
      font-size: 15px;
      margin-bottom: 16px;
    }
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .dashboard {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .sidebar {
      width: 280px;
      background: rgba(12, 12, 26, 0.65);
      backdrop-filter: blur(22px);
      padding: 30px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
    }
    .sidebar-btn {
      background: transparent;
      border: none;
      color: #b2a4bc;
      padding: 15px 22px;
      border-radius: 18px;
      font-weight: 700;
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      transition: all 0.35s ease;
      letter-spacing: 0.3px;
    }
    .sidebar-btn:hover {
      background: rgba(241, 90, 44, 0.2);
      color: #ffb08c;
      transform: translateX(8px);
      box-shadow: 0 4px 16px rgba(241,90,44,0.15);
    }
    .sidebar-btn.active {
      background: rgba(241, 90, 44, 0.32);
      color: #F15A2C;
      box-shadow: 0 8px 24px rgba(241, 90, 44, 0.3);
      border-left: 3px solid #F15A2C;
    }
    .content-area {
      flex: 1;
      padding: 36px;
      overflow-y: auto;
      background: rgba(6, 6, 16, 0.4);
      animation: fadeInUp 0.55s ease;
    }
    .card {
      background: rgba(18, 18, 34, 0.65);
      backdrop-filter: blur(18px);
      border-radius: 30px;
      padding: 34px;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 24px;
      transition: all 0.4s ease;
      animation: cardFloat 8s ease-in-out infinite;
    }
    .card:hover {
      border-color: rgba(241, 90, 44, 0.3);
      box-shadow: 0 16px 44px rgba(0,0,0,0.5), 0 0 25px rgba(241,90,44,0.1);
    }
    .grid-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 18px 0;
    }
    .checkbox-pill {
      background: rgba(255, 255, 255, 0.04);
      border: 2px solid rgba(255, 255, 255, 0.16);
      border-radius: 36px;
      padding: 12px 22px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #ccc0d4;
      transition: all 0.35s ease;
      user-select: none;
    }
    .checkbox-pill:hover {
      border-color: #F15A2C;
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(241,90,44,0.2);
    }
    .checkbox-pill.checked {
      background: rgba(241, 90, 44, 0.35);
      border-color: #F15A2C;
      color: #ffb08c;
      box-shadow: 0 8px 24px rgba(241, 90, 44, 0.35);
    }
    .order-item,
    .appeal-item {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 20px;
      padding: 20px;
      margin: 12px 0;
      border-left: 5px solid #F15A2C;
      transition: all 0.35s ease;
      cursor: pointer;
    }
    .order-item:hover,
    .appeal-item:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateX(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .hidden {
      display: none !important;
    }

    .tabs-inner {
      display: flex;
      gap: 12px;
      margin-bottom: 26px;
      flex-wrap: wrap;
    }
    .tab-inner {
      padding: 12px 26px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.12);
      color: #b0a0b8;
      cursor: pointer;
      transition: all 0.35s ease;
      font-weight: 700;
      font-size: 14px;
    }
    .tab-inner:hover {
      border-color: #F15A2C;
      color: #ffb08c;
      background: rgba(241,90,44,0.15);
    }
    .tab-inner.active {
      background: #F15A2C;
      color: white;
      border-color: #F15A2C;
      box-shadow: 0 10px 28px rgba(241, 90, 44, 0.5);
      transform: scale(1.05);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      text-align: left;
      direction: ltr;
    }
    .detail-row span:first-child {
      font-weight: 700;
      color: #b8a8c8;
      min-width: 120px;
    }
    .detail-row span:last-child {
      color: #f2e8dc;
      text-align: left;
      flex: 1;
      white-space: pre-wrap;
    }

    #map {
      height: 320px;
      border-radius: 20px;
      margin: 20px 0;
      border: 2px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .admin-reply {
      color: #e74c3c;
      font-weight: 700;
      margin-top: 12px;
      padding: 14px;
      background: rgba(231, 76, 60, 0.15);
      border-radius: 14px;
      border-left: 4px solid #e74c3c;
      animation: fadeInUp 0.4s ease;
    }
    .reply-block {
      margin-top: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border-left: 3px solid #F15A2C;
    }

    .chat-messages {
      max-height: 440px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .chat-msg {
      padding: 13px 18px;
      border-radius: 18px;
      margin: 10px 0;
      max-width: 72%;
      clear: both;
      animation: fadeInUp 0.35s ease;
      line-height: 1.4;
    }
    .chat-msg.mine {
      background: linear-gradient(135deg, #F15A2C, #e04820);
      color: white;
      float: right;
      box-shadow: 0 8px 20px rgba(241,90,44,0.3);
    }
    .chat-msg.other {
      background: rgba(255, 255, 255, 0.1);
      color: #e0d6cc;
      float: left;
      border: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
<div class="app-wrapper" id="appWrapper">
  <div class="logo-header" id="logoHeader">
    <div class="logo-left">
      <img src="https://raw.githubusercontent.com/.../logotip.PNG" alt="TUMIX Client" class="logo-img" id="clientLogo">
      <img src="https://raw.githubusercontent.com/.../logo.PNG" alt="TUMIX Employee" class="logo-img hidden" id="employeeLogo">
      <span class="logo-text">TUMIX</span>
    </div>
    <button class="logout-btn hidden" id="logoutBtn">🚪 Выйти из системы</button>
  </div>

  <div id="authScreen" class="auth-screen">
    <div class="auth-tabs">
      <button class="auth-tab active" id="clientTab">👤 Клиент</button>
      <button class="auth-tab" id="employeeTab">🛡️ Сотрудник</button>
    </div>
    <div id="authFormsContainer" class="auth-card"></div>
  </div>

  <div id="clientDashboard" class="dashboard hidden">
    <div class="sidebar">
      <button class="sidebar-btn active" data-view="delivery">📦 Доставка</button>
      <button class="sidebar-btn" data-view="appeals">📋 Мои обращения</button>
      <button class="sidebar-btn" data-view="orders">📑 Мои заказы</button>
      <button class="sidebar-btn" data-view="support">💬 Поддержка</button>
    </div>
    <div class="content-area" id="clientContent"></div>
  </div>

  <div id="employeeDashboard" class="dashboard hidden">
    <div class="sidebar">
      <button class="sidebar-btn active" data-view="empChat">💬 Чат с клиентами</button>
      <button class="sidebar-btn" data-view="empAppeals">📋 Все обращения</button>
      <button class="sidebar-btn" data-view="allOrders">📦 Все заказы</button>
      <button class="sidebar-btn" data-view="colleagueChat">👥 Чат коллег</button>
    </div>
    <div class="content-area" id="employeeContent"></div>
  </div>
</div>

<script>
  (() => {
    const store = (k, v) => v !== undefined ? localStorage.setItem(k, JSON.stringify(v)) : JSON.parse(localStorage.getItem(k) || 'null');
    const users = () => store('tumix_users') || [];
    const orders = () => store('tumix_orders') || [];
    const appeals = () => store('tumix_appeals') || [];
    const empAppeals = () => store('tumix_emp_appeals') || [];
    const resolvedAppeals = () => store('tumix_resolved_appeals') || [];
    const resolvedEmpAppeals = () => store('tumix_resolved_emp_appeals') || [];
    const colleagueChats = () => store('tumix_colleague_chats') || [];

    let currentClient = null,
      currentEmployee = null;
    const TEST_EMP = { tab: 'TUM-0001', password: 'Password0001', name: 'Алексей Смирнов', role: 'support' };
    const ADMIN_EMP = { tab: 'OWNER_MARTIN_MEFIKOV0001', password: 'MARTIN_MEFIKOV0001', name: 'Мартин Мефиков', role: 'admin' };

    function showToast(msg) {
      const existing = document.querySelector('.toast-notification');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast-notification';
      toast.innerHTML = '✨ ' + msg;
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.4s ease';
        setTimeout(() => toast.remove(), 400); }, 3200);
    }

    function showModal(title, content, onConfirm) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-window">
          <h3>${title}</h3>
          ${content}
          <div class="modal-buttons">
            <button class="btn btn-outline cancel-modal" style="width:auto;">Отмена</button>
            <button class="btn btn-primary confirm-modal" style="width:auto;">Подтвердить</button>
          </div>

    async function geocodeAddress(address) {
      try {
        let query = address;
        if (!query.toLowerCase().includes('москва') && !query.toLowerCase().includes('мск') && !query.toLowerCase().includes('москов')) {
          query += ', Московская область';
        }
        const resp = await fetch(
          `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&accept-language=ru`
        );
        const data = await resp.json();
        if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), display: data[0].display_name };
        return null;
      } catch (e) { return null; }
    }

    function calculateRealDistance(lat1, lng1, lat2, lng2) {
      const R = 6371,
        dLat = (lat2 - lat1) * Math.PI / 180,
        dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      return Math.max(1, Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a))));
    }

        const sub = document.getElementById('appealsSubContent');
        if (e.target.id === 'tabClientAppeals') sub.innerHTML = appeals().map(a => `
          <div class="appeal-item"><b>🎫 #${a.id}</b> — ${a.status||'Открыто'}<div class="details" style="margin-top:14px;">
            <div class="detail-row"><span>👤 Сотрудник:</span><span>${a.empName} (${a.empTab})</span></div>
            <div class="detail-row"><span>👤 Клиент:</span><span>${a.clientName}</span></div>
            <div class="detail-row"><span>📝 Проблема:</span><span>${a.problem}</span></div>
            ${a.replies ? a.replies.map(r => `<div class="reply-block">🔴 <b>Руководитель:</b> ${r}</div>`).join('') : ''}
            ${currentEmployee?.role==='admin' ? `<textarea id="replyText_${a.id}" placeholder="Ответ руководителя..." style="width:100%;margin-top:10px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.15);border-radius:14px;padding:12px;color:white;min-height:70px;"></textarea>
            <button class="btn btn-primary reply-btn" data-id="${a.id}" style="margin-top:6px;">📩 Ответить</button>
            <button class="btn btn-outline close-btn" data-id="${a.id}" style="margin-top:6px;">✅ Закрыть</button>
            <button class="btn btn-danger delete-btn" data-id="${a.id}" style="margin-top:6px;">🗑️ Удалить</button>` : ''}
          </div></div>`).join('')||'<p>Нет обращений</p>';
        if (e.target.id === 'tabEmpAppeals') sub.innerHTML = empAppeals().filter(a=>a.empTab===currentEmployee?.tab||currentEmployee?.role==='admin').map(a=>`
          <div class="appeal-item"><b>👔 ${a.empName}</b> → Руководителю<div class="details" style="margin-top:14px;">
            <div class="detail-row"><span>🪪 Табельный:</span><span>${a.empTab}</span></div>
            <div class="detail-row"><span>📝 Текст:</span><span style="white-space:pre-wrap;">${a.text}</span></div>
            ${a.replies ? a.replies.map(r => `<div class="reply-block">🔴 <b>Ответ:</b> ${r}</div>`).join('') : ''}
            ${currentEmployee?.role==='admin' ? `<textarea id="empReplyText_${a.empName}" placeholder="Ответ..." style="width:100%;margin-top:10px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.15);border-radius:14px;padding:12px;color:white;min-height:70px;"></textarea>
            <button class="btn btn-primary emp-reply-btn" data-emp="${a.empName}" style="margin-top:6px;">📩 Ответить</button>
            <button class="btn btn-outline close-emp-btn" data-emp="${a.empName}" style="margin-top:6px;">✅ Закрыть</button>` : ''}
          </div></div>`).join('')||'<p>Нет обращений</p>';
        if (e.target.id === 'tabResolvedClient') sub.innerHTML = resolvedAppeals().map(a=>`
          <div class="appeal-item"><b>✅ #${a.id}</b><div class="details" style="margin-top:14px;">
            <div class="detail-row"><span>Клиент:</span><span>${a.clientName}</span></div>
            <div class="detail-row"><span>Проблема:</span><span>${a.problem}</span></div>
            ${a.replies ? a.replies.map(r=>`<div class="reply-block">🔴 ${r}</div>`).join('') : ''}
            ${currentEmployee?.role==='admin' ? `<button class="btn btn-danger delete-resolved-btn" data-id="${a.id}" style="margin-top:6px;">🗑️ Удалить</button>` : ''}
          </div></div>`).join('')||'<p>Нет решенных</p>';
        if (e.target.id === 'tabResolvedEmp') sub.innerHTML = resolvedEmpAppeals().map(a=>`
          <div class="appeal-item"><b>✅ ${a.empName}</b><div class="details" style="margin-top:14px;">
            <div class="detail-row"><span>Текст:</span><span>${a.text}</span></div>
            ${a.replies ? a.replies.map(r=>`<div class="reply-block">🔴 ${r}</div>`).join('') : ''}
            ${currentEmployee?.role==='admin' ? `<button class="btn btn-danger delete-resolved-emp-btn" data-emp="${a.empName}" style="margin-top:6px;">🗑️ Удалить</button>` : ''}
          </div></div>`).join('')||'<p>Нет решенных</p>';
        if (e.target.id === 'tabCreateClient') sub.innerHTML = `<div class="form-card"><h3>➕ Новое обращение клиента</h3><div class="input-column">
          <div class="field-group"><label>👤 ФИО сотрудника *</label><input id="eName"></div>
          <div class="field-group"><label>🪪 Табельный номер *</label><input id="eTab" placeholder="TUM-0001"></div>
          <div class="field-group"><label>👤 ФИО клиента *</label><input id="cName"></div>
          <div class="field-group"><label>📧 Почта *</label><input id="cEmail"></div>
          <div class="field-group"><label>📱 Телефон *</label><input id="cPhone" value="+7"></div>
          <div class="field-group"><label>📝 Проблема *</label><textarea id="cProblem"></textarea></div>
          <button class="btn btn-primary" id="submitClientAppeal">Оформить</button></div></div>`;
        if (e.target.id === 'tabCreateEmp') sub.innerHTML = `<div class="form-card"><h3>📝 Обращение сотрудника</h3><div class="input-column">
          <div class="field-group"><label>👤 ФИО *</label><input id="eName2"></div>
          <div class="field-group"><label>🪪 Табельный *</label><input id="eTab2" placeholder="TUM-0001"></div>
          <div class="field-group"><label>📌 Кому</label><input disabled value="Руководителю поддержки TUMIX"></div>
          <div class="field-group"><label>📝 Текст</label><textarea id="eText">Руководителю отдела поддержки сотрудников TUMIX.</textarea></div>
          <button class="btn btn-primary" id="submitEmpAppeal">Оформить</button></div></div>`;
      }
      if (e.target.classList.contains('reply-btn')) {
        e.stopPropagation();
        const id = e.target.dataset.id;
        const text = document.getElementById('replyText_' + id).value.trim();
        if (!text) return showToast('Введите ответ');
        const upd = appeals().map(a => a.id === id ? { ...a, replies: [...(a.replies||[]), text] } : a);
        store('tumix_appeals', upd);
        showToast('Ответ добавлен');
        document.getElementById('tabClientAppeals').click();
      }
      if (e.target.classList.contains('emp-reply-btn')) {
        e.stopPropagation();
        const emp = e.target.dataset.emp;
        const text = document.getElementById('empReplyText_' + emp).value.trim();
        if (!text) return showToast('Введите ответ');
        const upd = empAppeals().map(a => a.empName === emp ? { ...a, replies: [...(a.replies||[]), text] } : a);
        store('tumix_emp_appeals', upd);
        showToast('Ответ отправлен');
        document.getElementById('tabEmpAppeals').click();
      }
      if (e.target.classList.contains('close-btn')) {
        e.stopPropagation();
        const id = e.target.dataset.id;
        const app = appeals().find(a => a.id === id);
        if (!app) return;
        store('tumix_resolved_appeals', [...resolvedAppeals(), { ...app, status: 'Закрыто', closedAt: new Date().toISOString() }]);
        store('tumix_appeals', appeals().filter(a => a.id !== id));
        showToast('Обращение закрыто');
        document.getElementById('tabClientAppeals').click();
      }
      if (e.target.classList.contains('close-emp-btn')) {
        e.stopPropagation();
        const emp = e.target.dataset.emp;
        const app = empAppeals().find(a => a.empName === emp);
        if (!app) return;
        store('tumix_resolved_emp_appeals', [...resolvedEmpAppeals(), { ...app, status: 'Закрыто' }]);
        store('tumix_emp_appeals', empAppeals().filter(a => a.empName !== emp));
        showToast('Обращение сотрудника закрыто');
        document.getElementById('tabEmpAppeals').click();
      }
      if (e.target.classList.contains('delete-btn')) {
        e.stopPropagation();
        const id = e.target.dataset.id;
        showModal('Удаление обращения', '<p>Удалить обращение #' + id + '?</p>', () => {
          store('tumix_appeals', appeals().filter(a => a.id !== id));
          showToast('Обращение удалено');
          document.getElementById('tabClientAppeals').click();
        });
      }
      if (e.target.classList.contains('delete-resolved-btn')) {
        e.stopPropagation();
        const id = e.target.dataset.id;
        showModal('Удаление решенного', '<p>Удалить решенное обращение #' + id + ' навсегда?</p>', () => {
          store('tumix_resolved_appeals', resolvedAppeals().filter(a => a.id !== id));
          showToast('Решенное удалено');
          document.getElementById('tabResolvedClient').click();
        });
      }
      if (e.target.classList.contains('delete-resolved-emp-btn')) {
        e.stopPropagation();
        const emp = e.target.dataset.emp;
        showModal('Удаление', '<p>Удалить решенное обращение сотрудника ' + emp + '?</p>', () => {
          store('tumix_resolved_emp_appeals', resolvedEmpAppeals().filter(a => a.empName !== emp));
          showToast('Удалено');
          document.getElementById('tabResolvedEmp').click();
        });
      }
      if (e.target.classList.contains('edit-order-btn')) {
        e.stopPropagation();
        const id = e.target.dataset.id;
        showModal('Изменение статуса заказа #' + id, `
          <select id="statusSelect">
            <option>Оформлен</option><option>В пути</option><option>Доставлен</option><option>Отменён</option>
          </select>`, (status) => {
          store('tumix_orders', orders().map(o => o.id === id ? { ...o, status } : o));
          showToast('Статус обновлён');
          renderEmployeeView('allOrders');
        });
      }
      if (e.target.classList.contains('cancel-order-btn')) {
        e.stopPropagation();
        const id = e.target.dataset.id;
        showModal('Отмена заказа #' + id, '<p>Вы уверены, что хотите отменить заказ?</p>', () => {
          store('tumix_orders', orders().map(o => o.id === id ? { ...o, status: 'Отменён' } : o));
          showToast('Заказ отменён');
          renderEmployeeView('allOrders');
        });
      }
      if (e.target.id === 'submitClientAppeal') {
        const app = {
          id: String(appeals().length + 1).padStart(7, '0'),
          empName: document.getElementById('eName').value,
          empTab: document.getElementById('eTab').value,
          clientName: document.getElementById('cName').value,
          clientEmail: document.getElementById('cEmail').value,
          clientPhone: document.getElementById('cPhone').value,
          problem: document.getElementById('cProblem').value,
          status: 'Открыто', replies: []
        };
        store('tumix_appeals', [...appeals(), app]);
        showToast('Обращение создано');
        document.getElementById('tabClientAppeals').click();
      }
      if (e.target.id === 'submitEmpAppeal') {
        store('tumix_emp_appeals', [...empAppeals(), {
          empName: document.getElementById('eName2').value,
          empTab: document.getElementById('eTab2').value,
          text: 'Руководителю отдела поддержки сотрудников TUMIX.', replies: []
        }]);
        showToast('Создано');
        document.getElementById('tabEmpAppeals').click();
      }
      if (e.target.id === 'sendColleague') {
        const inp = document.getElementById('colleagueInput');
        if (!inp.value.trim()) return;
        store('tumix_colleague_chats', [...colleagueChats(), { from: currentEmployee?.name || 'Сотрудник', text: inp.value, time: new Date().toLocaleTimeString('ru-RU') }]);
        renderEmployeeView('colleagueChat');
      }
      if (e.target.id === 'sendChat') {
        const inp = document.getElementById('chatInput');
        if (!inp.value.trim()) return;
        const d = document.createElement('div');
        d.style.cssText = 'background:rgba(241,90,44,0.3);padding:12px 16px;border-radius:16px;margin:8px 0;color:white;text-align:right;';
        d.textContent = inp.value;
        document.getElementById('chatMsgs').appendChild(d);
        if (!supportSessionAnswered) {
          setTimeout(() => {
            const r = document.createElement('div');
            r.style.cssText = 'background:rgba(255,255,255,0.06);padding:12px 16px;border-radius:16px;margin:8px 0;';
            r.textContent = '👩‍💼 Оператор скоро ответит вам, пожалуйста подождите.';
            document.getElementById('chatMsgs').appendChild(r);
            supportSessionAnswered = true;
          }, 800);
        }
        inp.value = '';
        document.getElementById('chatMsgs').scrollTop = document.getElementById('chatMsgs').scrollHeight;
      }
    });

    if (!currentClient && !currentEmployee) renderAuth();
  })();
</script>
</body>
</html>
