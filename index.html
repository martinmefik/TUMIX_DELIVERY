<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>TUMIX — Доставка с душой</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23F15A2C'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold' font-size='18'>T</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js">
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #03030a;
      --bg2: rgba(10, 10, 24, 0.88);
      --card: rgba(20, 20, 40, 0.7);
      --text: #e8e4f0;
      --text2: #b8a8c8;
      --border: rgba(255, 255, 255, 0.1);
      --accent: #F15A2C;
      --danger: #e74c3c;
      --input: rgba(255, 255, 255, 0.05);
      --sidebar-bg: rgba(10, 10, 26, 0.7);
    }

    .light-theme {
      --bg: #f5f0ea;
      --bg2: rgba(255, 250, 245, 0.92);
      --card: rgba(255, 250, 245, 0.85);
      --text: #1a1a2e;
      --text2: #4a3f5c;
      --border: rgba(0, 0, 0, 0.1);
      --accent: #d94e1a;
      --danger: #c0392b;
      --input: rgba(0, 0, 0, 0.03);
      --sidebar-bg: rgba(255, 250, 245, 0.8);
    }

    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }
    ::-webkit-scrollbar-track {
      background: var(--input);
      border-radius: 20px;
      margin: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 20px;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(ellipse at 20% 30%, rgba(241, 90, 44, 0.18) 0%, transparent 60%), radial-gradient(ellipse at 80% 60%, rgba(255, 160, 80, 0.14) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
      transition: background 0.4s, color 0.4s;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -400% center; }
      100% { background-position: 400% center; }
    }

    .app-wrapper {
      width: 100%;
      max-width: 1500px;
      min-height: 95vh;
      background: var(--bg2);
      backdrop-filter: blur(44px);
      -webkit-backdrop-filter: blur(44px);
      border-radius: 56px;
      border: 2px solid var(--border);
      box-shadow: 0 70px 140px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .logo-header {
      padding: 24px 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 8, 22, 0.45);
      backdrop-filter: blur(20px);
      flex-wrap: wrap;
      gap: 16px;
    }
    .logo-text {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -1.2px;
      background: linear-gradient(135deg, #f5dfc8, #c8b098, #f5dfc8, #e0c8a8);
      background-size: 400% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 5s linear infinite;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .support-email {
      color: var(--accent);
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      background: rgba(241, 90, 44, 0.1);
      padding: 10px 20px;
      border-radius: 24px;
      cursor: pointer;
      transition: 0.3s;
    }
    .theme-toggle {
      background: var(--input);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 24px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      transition: 0.3s;
    }
    .logout-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 14px 32px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      transition: all 0.4s ease;
    }
    .logout-btn:hover {
      background: #c0392b;
      color: white;
      border-color: #e74c3c;
    }

    .auth-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 28px;
    }
    .auth-tabs {
      display: flex;
      gap: 10px;
      background: var(--input);
      padding: 8px;
      border-radius: 34px;
      margin-bottom: 44px;
    }
    .auth-tab {
      padding: 15px 42px;
      border-radius: 30px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.4s ease;
    }
    .auth-tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 16px 38px rgba(241, 90, 44, 0.7);
      transform: scale(1.06);
    }

    .auth-card,
    .form-card {
      background: var(--card);
      backdrop-filter: blur(32px);
      border-radius: 44px;
      padding: 48px 44px;
      width: 100%;
      max-width: 600px;
      border: 2px solid var(--border);
      box-shadow: 0 45px 80px rgba(0, 0, 0, 0.3);
    }
    .auth-card h2,
    .form-card h3 {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 34px;
      text-align: center;
      color: var(--text);
    }

    .input-column {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field-group label {
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: var(--text2);
    }
    .field-group input,
    .field-group textarea {
      width: 100%;
      padding: 17px 24px;
      background: var(--input);
      border: 2px solid var(--border);
      border-radius: 24px;
      font-size: 17px;
      color: var(--text);
      outline: none;
      transition: all 0.4s ease;
      font-family: inherit;
      resize: vertical;
    }
    .field-group input:focus,
    .field-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 8px rgba(241, 90, 44, 0.3);
    }

    .btn {
      padding: 18px 30px;
      border-radius: 26px;
      border: none;
      font-weight: 700;
      font-size: 17px;
      cursor: pointer;
      transition: all 0.4s ease;
      letter-spacing: 0.7px;
      width: 100%;
      margin-top: 18px;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 18px 40px rgba(241, 90, 44, 0.6);
    }
    .btn-primary:hover {
      transform: translateY(-5px);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text);
    }
    .btn-danger {
      background: var(--danger);
      color: white;
    }
    .link-text {
      text-align: center;
      margin-top: 24px;
      font-size: 16px;
      color: var(--text2);
    }
    .link-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .toast-notification {
      position: fixed;
      top: 32px;
      right: 32px;
      background: var(--card);
      backdrop-filter: blur(28px);
      border: 2px solid var(--accent);
      border-radius: 26px;
      padding: 24px 36px;
      color: var(--text);
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 28px 60px rgba(0, 0, 0, 0.5);
      z-index: 9999;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .modal-window {
      background: var(--card);
      border: 2px solid var(--accent);
      border-radius: 34px;
      padding: 38px;
      min-width: 440px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 35px 70px rgba(0, 0, 0, 0.6);
    }
    .modal-window h3 {
      margin-bottom: 22px;
      color: var(--text);
      font-size: 24px;
    }
    .modal-window select {
      width: 100%;
      padding: 16px 20px;
      background: var(--input);
      border: 2px solid var(--border);
      border-radius: 18px;
      color: var(--text);
      font-size: 17px;
      margin-bottom: 24px;
    }
    .modal-buttons {
      display: flex;
      gap: 14px;
      justify-content: flex-end;
    }

    .dashboard {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .sidebar {
      width: 300px;
      background: var(--sidebar-bg);
      backdrop-filter: blur(26px);
      padding: 34px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-right: 1px solid var(--border);
    }
    .sidebar-btn {
      background: transparent;
      border: none;
      color: var(--text2);
      padding: 16px 24px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      transition: all 0.4s ease;
      letter-spacing: 0.4px;
    }
    .sidebar-btn:hover {
      background: rgba(241, 90, 44, 0.22);
      color: var(--accent);
      transform: translateX(10px);
    }
    .sidebar-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 10px 28px rgba(241, 90, 44, 0.35);
      border-left: 4px solid white;
    }
    .content-area {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
      background: rgba(6, 6, 18, 0.2);
    }
    .card {
      background: var(--card);
      backdrop-filter: blur(22px);
      border-radius: 36px;
      padding: 38px;
      border: 2px solid var(--border);
      margin-bottom: 28px;
      transition: all 0.5s ease;
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin: 22px 0;
    }
    .checkbox-pill {
      background: var(--input);
      border: 2px solid var(--border);
      border-radius: 40px;
      padding: 13px 26px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: var(--text2);
      transition: all 0.4s ease;
    }
    .checkbox-pill.checked {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .order-item,
    .appeal-item {
      background: var(--input);
      border-radius: 24px;
      padding: 24px;
      margin: 16px 0;
      border-left: 6px solid var(--accent);
      transition: all 0.4s ease;
      cursor: pointer;
    }
    .order-item:hover,
    .appeal-item:hover {
      background: rgba(241, 90, 44, 0.1);
      transform: translateX(10px);
    }
    .hidden {
      display: none !important;
    }

    .tabs-inner {
      display: flex;
      gap: 14px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .tab-inner {
      padding: 13px 30px;
      border-radius: 34px;
      background: var(--input);
      border: 2px solid var(--border);
      color: var(--text2);
      cursor: pointer;
      transition: all 0.4s ease;
      font-weight: 700;
      font-size: 15px;
    }
    .tab-inner.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 12px 32px rgba(241, 90, 44, 0.55);
      transform: scale(1.06);
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .detail-row span:first-child {
      font-weight: 700;
      color: var(--text2);
      min-width: 140px;
    }
    .detail-row span:last-child {
      color: var(--text);
      text-align: left;
      flex: 1;
      white-space: pre-wrap;
    }

    #map {
      height: 360px;
      border-radius: 24px;
      margin: 24px 0;
      border: 2px solid var(--border);
    }

    .admin-reply {
      color: var(--danger);
      font-weight: 700;
      margin-top: 14px;
      padding: 16px;
      background: rgba(231, 76, 60, 0.18);
      border-radius: 16px;
      border-left: 5px solid var(--danger);
    }
    .reply-block {
      margin-top: 14px;
      padding: 14px;
      background: var(--input);
      border-radius: 14px;
      border-left: 4px solid var(--accent);
    }

    .chat-messages {
      max-height: 480px;
      overflow-y: auto;
      background: var(--input);
      border-radius: 24px;
      padding: 26px;
      margin-bottom: 24px;
      border: 2px solid var(--border);
    }
    .chat-msg {
      padding: 15px 22px;
      border-radius: 22px;
      margin: 12px 0;
      max-width: 74%;
      clear: both;
      line-height: 1.5;
    }
    .chat-msg.mine {
      background: var(--accent);
      color: white;
      float: right;
    }
    .chat-msg.other {
      background: rgba(128, 128, 128, 0.2);
      color: var(--text);
      float: left;
    }
  </style>
</head>
<body class="dark-theme">
  <div class="app-wrapper" id="appWrapper">
    <div class="logo-header" id="logoHeader">
      <div class="logo-left">
        <span class="logo-text" id="dynamicLogo">TUMIX</span>
      </div>
      <div class="header-right">
        <span class="support-email" id="copyEmail">📧 tumix.support@gmail.com</span>
        <button class="theme-toggle" id="themeToggle">🌓 Тема</button>
        <button class="logout-btn hidden" id="logoutBtn">🚪 Выйти из системы</button>
      </div>
    </div>

    <div id="authScreen" class="auth-screen">
      <div class="auth-tabs">
        <button class="auth-tab active" id="clientTab">👤 Клиент</button>
        <button class="auth-tab" id="employeeTab">🛡️ Сотрудник</button>
      </div>
      <div id="authFormsContainer" class="auth-card"></div>
    </div>

    <div id="clientDashboard" class="dashboard hidden">
      <div class="sidebar">
        <button class="sidebar-btn active" data-view="delivery">📦 Доставка</button>
        <button class="sidebar-btn" data-view="appeals">📋 Мои обращения</button>
        <button class="sidebar-btn" data-view="orders">📑 Мои заказы</button>
        <button class="sidebar-btn" data-view="support">💬 Поддержка</button>
        <button class="sidebar-btn" data-view="rules">📜 Правила</button>
      </div>
      <div class="content-area" id="clientContent"></div>
    </div>

    <div id="employeeDashboard" class="dashboard hidden">
      <div class="sidebar">
        <button class="sidebar-btn active" data-view="empChat">💬 Чат с клиентами</button>
        <button class="sidebar-btn" data-view="empAppeals">📋 Все обращения</button>
        <button class="sidebar-btn" data-view="allOrders">📦 Все заказы</button>
        <button class="sidebar-btn" data-view="colleagueChat">👥 Чат коллег</button>
        <button class="sidebar-btn" data-view="empRules">📜 Правила</button>
      </div>
      <div class="content-area" id="employeeContent"></div>
    </div>
  </div>

  <script>
    (() => {
      const store = (k, v) => v !== undefined ? localStorage.setItem(k, JSON.stringify(v)) : JSON.parse(localStorage.getItem(k) || 'null');
      const users = () => store('tumix_users') || [];
      const orders = () => store('tumix_orders') || [];
      const appeals = () => store('tumix_appeals') || [];
      const empAppeals = () => store('tumix_emp_appeals') || [];
      const resolvedAppeals = () => store('tumix_resolved_appeals') || [];
      const resolvedEmpAppeals = () => store('tumix_resolved_emp_appeals') || [];
      const colleagueChats = () => store('tumix_colleague_chats') || [];
      const supportChats = () => store('tumix_support_chats') || [];
      const agreementAccepted = () => localStorage.getItem('tumix_agreement_accepted') === 'true';

      let currentClient = null,
        currentEmployee = null;
      const TEST_EMP = { tab: 'TUM-0001', password: 'Password0001', name: 'Алексей Смирнов', role: 'support' };
      const ADMIN_EMP = { tab: 'OWNER_MARTIN_MEFIKOV0001', password: 'MARTIN_MEFIKOV0001', name: 'Мартин Мефиков', role: 'admin' };

      const dynamicLogo = document.getElementById('dynamicLogo');
      const themeToggle = document.getElementById('themeToggle');

      // Инициализация темы
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
        document.body.classList.remove('dark-theme');
      } else {
        document.body.classList.add('dark-theme');
      }
      themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('light-theme');
        document.body.classList.toggle('dark-theme');
        localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
      });

      function showToast(msg) {
        const old = document.querySelector('.toast-notification');
        if (old) old.remove();
        const t = document.createElement('div');
        t.className = 'toast-notification';
        t.textContent = '✨ ' + msg;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; t.style.transition = '0.5s'; setTimeout(() => t.remove(), 500); }, 3000);
      }

      function showModal(title, content, onConfirm) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
        <div class="modal-window">
          <h3>${title}</h3>
          ${content}
          <div class="modal-buttons">
            <button class="btn btn-outline cancel-modal" style="width:auto;">Отмена</button>
            <button class="btn btn-primary confirm-modal" style="width:auto;">Подтвердить</button>
          </div>
        </div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('.cancel-modal').addEventListener('click', () => overlay.remove());
        overlay.querySelector('.confirm-modal').addEventListener('click', () => {
          const select = overlay.querySelector('select');
          const value = select ? select.value : true;
          overlay.remove();
          if (onConfirm) onConfirm(value);
        });
      }

      function showRulesModal() {
        const rules = `
        <div style="max-height:60vh;overflow-y:auto;padding-right:10px;">
          <p><b>1. При использовании услуг компании TUMIX пользователь соглашается на обработку и хранение персональных данных. Данные хранятся в соответствии с Федеральным законом от 27 июля 2006 года №152-ФЗ «О персональных данных».</b></p>
          <p><b style="color:#e74c3c;">2. Клиент подтверждает, что в грузе нет ничего запрещённого. Список запрещённого к перевозке:</b> <span style="color:#e74c3c;font-weight:700;">Оружие (любое), Животные, Легковоспламеняющиеся вещества, Взрывчатые вещества, Лекарственные препараты, Наркотические и психотропные препараты, Денежные средства любой валюты, Вещества кислотного происхождения, Перекись водорода, Скоропортящиеся продукты (СПП), Дорогое ювелирное украшение, Хрупкие предметы без специальной упаковки.</span></p>
          <p>3. Компания TUMIX несёт полную ответственность за состояние груза при транспортировке. В случае его повреждения или утраты, пожалуйста, обратитесь в поддержку по вкладке «Поддержка».</p>
          <p>4. Если груз был повреждён во время транспортировки не по причине курьера, а из-за плохой упаковки товара (летает в коробке, сильно упакован и повреждён из-за давления и т. п.), то ответственность перекладывается на заказчика.</p>
          <p>5. Заказчик обязан предоставить достоверную информацию и подлинные данные. В случае если данные неверны, а курьер уже забрал заказ, заказ будет отменён, посылка возвращена и удержана комиссия.</p>
          <p>6. В случае кражи содержимого груза обратитесь на почту <b>tumix.support@gmail.com</b>. Необходимы будут фото доказательства при сборке.</p>
          <p>7. Курьер имеет право проверить, что находится в перевозке и не попадает ли ничего в список запрещённого.</p>

          <p>9. Если курьер или работник вам нагрубили, необходимо обратиться в поддержку. После регистрации заявления работник будет наказан.</p>
          <p>10. Компания TUMIX оставляет за собой право изменять условия пользования и тарифы с уведомлением на сайте.</p>
          <p>11. Клиент имеет право на возврат средств в соответствии с условиями договора-оферты.</p>
        </div>`;
        const overlay = document.createElement('div');

        document.body.appendChild(overlay);
        overlay.querySelector('.cancel-modal').addEventListener('click', () => overlay.remove());
      }

      function showAgreementModal(callback) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
        <div class="modal-window">
          <h3>📜 Пользовательское соглашение</h3>
          <div style="max-height:50vh;overflow-y:auto;padding-right:10px;margin-bottom:20px;">
            <p>Настоящее соглашение регулирует обработку и хранение персональных данных пользователей сервиса TUMIX в соответствии с Федеральным законом от 27 июля 2006 года №152-ФЗ «О персональных данных». Продолжая регистрацию, вы даёте согласие на сбор, обработку и хранение ваших персональных данных (имя, телефон, адрес электронной почты) в целях оказания услуг доставки.</p>
            <p>Вы также подтверждаете, что ознакомлены с <a href="#" id="rulesLink" style="color:var(--accent);text-decoration:underline;">Правилами пользования</a> сервисом TUMIX.</p>
          </div>
          <div class="modal-buttons">
            <button class="btn btn-danger decline-agreement" style="width:auto;">Отклонить</button>
            <button class="btn btn-primary accept-agreement" style="width:auto;">Принять</button>
          </div>
        </div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('#rulesLink').addEventListener('click', (e) => {
          e.preventDefault();
          overlay.remove();
          showRulesModal();
          setTimeout(() => showAgreementModal(callback), 100);
        });
        overlay.querySelector('.accept-agreement').addEventListener('click', () => {
          localStorage.setItem('tumix_agreement_accepted', 'true');
          overlay.remove();
          if (callback) callback(true);
        });
        overlay.querySelector('.decline-agreement').addEventListener('click', () => {
          overlay.remove();
          if (callback) callback(false);
        });
      }

      document.getElementById('copyEmail').addEventListener('click', () => {
        navigator.clipboard.writeText('tumix.support@gmail.com').then(() => showToast('Почта скопирована!'));
      });

      const authScreen = document.getElementById('authScreen');
      const clientDash = document.getElementById('clientDashboard');
      const empDash = document.getElementById('employeeDashboard');
      const authForms = document.getElementById('authFormsContainer');
      const logoutBtn = document.getElementById('logoutBtn');

      function updateUI() {
        if (currentClient) {
          authScreen.classList.add('hidden');
          clientDash.classList.remove('hidden');
          empDash.classList.add('hidden');
          logoutBtn.classList.remove('hidden');
          dynamicLogo.textContent = 'TUMIX CLIENT';
          localStorage.setItem('tumix_session', JSON.stringify({ type: 'client', id: currentClient.id }));
        } else if (currentEmployee) {
          authScreen.classList.add('hidden');
          empDash.classList.remove('hidden');
          clientDash.classList.add('hidden');
          logoutBtn.classList.remove('hidden');
          dynamicLogo.textContent = 'TUMIX SUPPORT';
          localStorage.setItem('tumix_session', JSON.stringify({ type: 'employee', tab: currentEmployee.tab }));
        } else {
          authScreen.classList.remove('hidden');
          clientDash.classList.add('hidden');
          empDash.classList.add('hidden');
          logoutBtn.classList.add('hidden');
          dynamicLogo.textContent = 'TUMIX';
          localStorage.removeItem('tumix_session');
        }
      }

      logoutBtn.addEventListener('click', () => { currentClient = null; currentEmployee = null; updateUI(); renderAuth(); });

      const session = JSON.parse(localStorage.getItem('tumix_session') || 'null');
      if (session) {
        if (session.type === 'client') { const u = users().find(x => x.id === session.id); if (u) { currentClient = u; updateUI(); renderClientView('delivery'); } }
        else if (session.type === 'employee') { if (session.tab === TEST_EMP.tab) currentEmployee = { ...TEST_EMP }; else if (session.tab === ADMIN_EMP.tab) currentEmployee = { ...ADMIN_EMP }; if (currentEmployee) { updateUI(); renderEmployeeView('empChat'); } }
      }

      let authMode = 'client';
      document.getElementById('clientTab').addEventListener('click', () => { authMode = 'client'; dynamicLogo.textContent = 'TUMIX CLIENT'; renderAuth(); });
      document.getElementById('employeeTab').addEventListener('click', () => { authMode = 'employee'; dynamicLogo.textContent = 'TUMIX SUPPORT'; renderAuth(); });

      function renderAuth() {
        document.getElementById('clientTab').classList.toggle('active', authMode === 'client');
        document.getElementById('employeeTab').classList.toggle('active', authMode === 'employee');
        if (authMode === 'client') {
          authForms.innerHTML = `
          <h2>Вход для клиентов</h2>
          <div class="input-column">
            <div class="field-group"><label>📧 Почта</label><input type="email" id="loginEmail" autocomplete="off"></div>
            <div class="field-group"><label>🔒 Пароль</label><input type="password" id="loginPass" autocomplete="off"></div>
          </div>
          <button class="btn btn-primary" id="loginClientBtn">Войти</button>
          <p class="link-text"><a href="#" id="showRegister">Регистрация</a></p>`;
          document.getElementById('loginClientBtn').addEventListener('click', () => {
            const e = document.getElementById('loginEmail').value.trim(), p = document.getElementById('loginPass').value.trim();
            const u = users().find(x => x.email === e && x.password === p);
            if (u) { currentClient = u; updateUI(); renderClientView('delivery'); } else showToast('Неверные данные');
          });
          document.getElementById('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            if (!agreementAccepted()) {
              showAgreementModal((accepted) => {
                if (accepted) {
                  showToast('Соглашение принято! Теперь вы можете зарегистрироваться.');
                  document.getElementById('showRegister').click();
                } else {
                  showToast('Регистрация невозможна без принятия соглашения.');
                }
              });
              return;
            }
            authForms.innerHTML = `
            <h2>Регистрация</h2>
            <div class="input-column">
              <div class="field-group"><label>Имя *</label><input id="regName"></div>
              <div class="field-group"><label>Почта *</label><input type="email" id="regEmail"></div>
              <div class="field-group"><label>Телефон *</label><input type="tel" id="regPhone" value="+7"></div>
              <div class="field-group"><label>Пароль *</label><input type="password" id="regPass"></div>
            </div>
            <button class="btn btn-primary" id="registerBtn">Зарегистрироваться</button>
            <p class="link-text"><a href="#" id="backToLogin">Назад</a></p>`;
            document.getElementById('registerBtn').addEventListener('click', () => {
              const n = document.getElementById('regName').value.trim(), em = document.getElementById('regEmail').value.trim(), ph = document.getElementById('regPhone').value.trim(), pw = document.getElementById('regPass').value.trim();
              if (!n || !em || !ph || !pw) return showToast('Заполните все поля');
              let u = users(); if (u.find(x => x.email === em)) return showToast('Почта занята');
              u.push({ id: Date.now().toString(), name: n, email: em, phone: ph, password: pw });
              store('tumix_users', u); showToast('Регистрация успешна!'); renderAuth();
            });
            document.getElementById('backToLogin').addEventListener('click', (ev) => { ev.preventDefault(); renderAuth(); });
          });
        } else {
          authForms.innerHTML = `
          <h2>Вход для сотрудников</h2>
          <div class="input-column">
            <div class="field-group"><label>Табельный номер</label><input id="empTab" placeholder="TUM-0001"></div>
            <div class="field-group"><label>Пароль</label><input type="password" id="empPass"></div>
          </div>
          <button class="btn btn-primary" id="loginEmpBtn">Войти</button>`;
          document.getElementById('loginEmpBtn').addEventListener('click', () => {
            const tab = document.getElementById('empTab').value.trim(), pass = document.getElementById('empPass').value.trim();
            if (tab === TEST_EMP.tab && pass === TEST_EMP.password) currentEmployee = { ...TEST_EMP };
            else if (tab === ADMIN_EMP.tab && pass === ADMIN_EMP.password) currentEmployee = { ...ADMIN_EMP };
            else return showToast('Неверные данные');
            updateUI(); renderEmployeeView('empChat');
          });
        }
      }

      document.querySelectorAll('#clientDashboard .sidebar-btn').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('#clientDashboard .sidebar-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        if (b.dataset.view === 'rules') showRulesModal();
        else renderClientView(b.dataset.view);
      }));

      document.querySelectorAll('#employeeDashboard .sidebar-btn').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('#employeeDashboard .sidebar-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        if (b.dataset.view === 'empRules') showRulesModal();
        else renderEmployeeView(b.dataset.view);
      }));

      let deliveryMap = null, routingControl = null;

      function initDeliveryMap() {
        setTimeout(() => {
          const mapEl = document.getElementById('map');
          if (!mapEl || deliveryMap) return;
          deliveryMap = L.map('map').setView([55.7558, 37.6173], 10);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(deliveryMap);
          deliveryMap.invalidateSize();
        }, 800);
      }

      async function geocodeAddress(address) {
        try {
          const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1&accept-language=ru`);
          const data = await resp.json();
          if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), display: data[0].display_name };
          return null;
        } catch (e) { return null; }
      }

      function deliveryForm() {
        return `<div class="card"><h3>📦 Оформление доставки</h3><div class="input-column">
        <div class="field-group"><label>👤 ФИО отправителя *</label><input id="sName" autocomplete="off"></div>
        <div class="field-group"><label>📱 Телефон отправителя *</label><input id="sPhone" value="+7" autocomplete="off"></div>
        <div class="field-group"><label>📍 Адрес отправки * <span style="font-weight:400;color:#ffa07c;">(пример: Балашиха свердлова 40)</span></label><input id="sAddr" placeholder="Балашиха свердлова 40" autocomplete="off"></div>
        <div class="field-group"><label>👤 ФИО получателя *</label><input id="rName" autocomplete="off"></div>
        <div class="field-group"><label>📱 Телефон получателя *</label><input id="rPhone" value="+7" autocomplete="off"></div>
        <div class="field-group"><label>📍 Адрес получателя * <span style="font-weight:400;color:#ffa07c;">(пример: Москва Тверская 1)</span></label><input id="rAddr" placeholder="Москва Тверская 1" autocomplete="off"></div>
        <div class="field-group"><label>📦 Содержимое *</label><input id="contentDesc" autocomplete="off"></div>
        <div class="checkbox-group" id="packCheckboxes">
          <label class="checkbox-pill"><input type="checkbox" value="Пакет" hidden> 🛍️ Пакет</label>
          <label class="checkbox-pill"><input type="checkbox" value="Конверт" hidden> ✉️ Конверт</label>
          <label class="checkbox-pill"><input type="checkbox" value="Коробка S" hidden> 📦 Коробка S</label>
          <label class="checkbox-pill"><input type="checkbox" value="Коробка M" hidden> 📦 Коробка M</label>
          <label class="checkbox-pill"><input type="checkbox" value="Коробка L" hidden> 📦 Коробка L</label>
          <label class="checkbox-pill"><input type="checkbox" value="Коробка XL" hidden> 📦 Коробка XL</label>
        </div>
        <div id="map"></div>
        <button class="btn btn-primary" id="calcDelivery">🧮 Рассчитать маршрут и стоимость</button>
        <div id="priceDetails"></div></div></div>`;
      }

      document.addEventListener('click', e => {
        if (e.target.id === 'calcDelivery') {
          const packs = [...document.querySelectorAll('#packCheckboxes input:checked')].map(c => c.value);
          if (!packs.length) return showToast('Выберите упаковку');
          const sAddr = document.getElementById('sAddr').value.trim(), rAddr = document.getElementById('rAddr').value.trim();
          if (!sAddr || !rAddr) return showToast('Заполните адреса');
          document.getElementById('priceDetails').innerHTML = '<p>🔄 Строим автомобильный маршрут...</p>';
          initDeliveryMap();
          Promise.all([geocodeAddress(sAddr), geocodeAddress(rAddr)]).then(([from, to]) => {
            if (!from || !to) { document.getElementById('priceDetails').innerHTML = '<p style="color:#ff7043;">❌ Адрес не найден</p>'; return; }
            if (deliveryMap) {
              if (routingControl) deliveryMap.removeControl(routingControl);
              routingControl = L.Routing.control({
                waypoints: [L.latLng(from.lat, from.lng), L.latLng(to.lat, to.lng)],
                routeWhileDragging: false, showAlternatives: false,
                lineOptions: { styles: [{ color: '#F15A2C', weight: 6 }] }
              }).addTo(deliveryMap);
              routingControl.on('routesfound', function(ev) {
                const dist = Math.round(ev.routes[0].summary.totalDistance / 1000);
                let km = dist * 22, serv = 29, total = km + serv;
                document.getElementById('priceDetails').innerHTML = `<div class="card"><div class="detail-row"><span>🛣️ По дороге:</span><span>${dist} км × 22₽ = ${km} ₽</span></div><div class="detail-row"><span>🔧 Сервис:</span><span>29 ₽</span></div><h3>💰 Итого: ${total} ₽</h3><button class="btn btn-primary" id="confirmOrder">Оформить</button></div>`;
              });
            }
          });
        }
        if (e.target.id === 'confirmOrder') {
          const ords = orders(); const newId = String(ords.length + 1).padStart(8, '0');
          store('tumix_orders', [...ords, { id: newId, clientId: currentClient.id, sender: document.getElementById('sName').value, sPhone: document.getElementById('sPhone').value, sAddr: document.getElementById('sAddr').value, recName: document.getElementById('rName').value, rPhone: document.getElementById('rPhone').value, rAddr: document.getElementById('rAddr').value, content: document.getElementById('contentDesc').value, packs: [...document.querySelectorAll('#packCheckboxes input:checked')].map(c => c.value), status: 'Оформлен', date: new Date().toLocaleString('ru-RU') }]);
          showToast('Заказ #' + newId + ' оформлен!');
          document.querySelector('#clientDashboard .sidebar-btn[data-view="orders"]').click();
        }
        if (e.target.closest('.checkbox-pill')) { const pill = e.target.closest('.checkbox-pill'), cb = pill.querySelector('input'); cb.checked = !cb.checked; pill.classList.toggle('checked', cb.checked); }
      });

      function clientOrders() {
        return `<h3>📑 Мои заказы</h3>` + orders().filter(o => o.clientId === currentClient?.id).map(o => `<div class="order-item" onclick="this.querySelector('.details').classList.toggle('hidden')"><b>#${o.id}</b> — ${o.status}<div class="details hidden"><div class="detail-row"><span>Отправитель:</span><span>${o.sender}</span></div><div class="detail-row"><span>Адрес отпр.:</span><span>${o.sAddr}</span></div><div class="detail-row"><span>Получатель:</span><span>${o.recName}</span></div><div class="detail-row"><span>Адрес получ.:</span><span>${o.rAddr}</span></div></div></div>`).join('') || '<p>Нет заказов</p>';
      }

      function clientAppeals() {
        return `<h3>📋 Мои обращения</h3>` + appeals().filter(a => a.clientEmail === currentClient?.email).map(a => `<div class="appeal-item" onclick="event.stopPropagation(); this.querySelector('.details').classList.toggle('hidden')"><b>#${a.id}</b> — ${a.status||'Открыто'}<div class="details hidden"><div class="detail-row"><span>Проблема:</span><span>${a.problem}</span></div>${a.replies ? a.replies.map(r => `<div class="admin-reply">🔴 Ответ руководителя поддержки TUMIX:<br>${r}</div>`).join('') : ''}</div></div>`).join('') || '<p>Нет обращений</p>';
      }

      function supportChat() {
        const msgs = supportChats();
        return `<div class="card"><h3>💬 Поддержка</h3><div class="chat-messages" id="chatMsgs">${msgs.length ? msgs.map(m => `<div class="chat-msg ${m.from === 'client' ? 'mine' : 'other'}">${m.text}</div>`).join('') : '<div class="chat-msg other">Здравствуйте! Это поддержка TUMIX.</div>'}</div><div style="display:flex;gap:14px;"><input id="chatInput" style="flex:1;background:var(--input);border:2px solid var(--border);border-radius:18px;padding:16px;color:var(--text);"><button class="btn btn-primary" id="sendChat" style="width:auto;">📤</button></div></div>`;
      }

      function renderClientView(view) {
        const a = document.getElementById('clientContent');
        if (view === 'delivery') { a.innerHTML = deliveryForm(); initDeliveryMap(); }
        else if (view === 'appeals') a.innerHTML = clientAppeals();
        else if (view === 'orders') a.innerHTML = clientOrders();
        else if (view === 'support') a.innerHTML = supportChat();
      }

      function renderEmployeeView(view) {
        const a = document.getElementById('employeeContent');
        if (view === 'empChat') a.innerHTML = '<div class="card"><h3>💬 Чаты с клиентами</h3><p style="text-align:center;padding:40px;">Список активных чатов появится после подключения базы данных.</p></div>';
        else if (view === 'empAppeals') a.innerHTML = empAppealsPanel();
        else if (view === 'allOrders') a.innerHTML = allOrdersView();
        else if (view === 'colleagueChat') a.innerHTML = colleagueChatPanel();
      }

      function allOrdersView() {
        return `<h3>📦 Все заказы</h3>` + orders().map(o => `<div class="order-item" onclick="this.querySelector('.details').classList.toggle('hidden')"><b>#${o.id}</b> — ${o.status}<div class="details hidden"><div class="detail-row"><span>Отправитель:</span><span>${o.sender}</span></div><div class="detail-row"><span>Получатель:</span><span>${o.recName}</span></div><div class="detail-row"><span>Статус:</span><span>${o.status}</span></div><button class="btn btn-outline edit-order-btn" data-id="${o.id}" style="margin-top:8px;">✏️ Статус</button><button class="btn btn-danger cancel-order-btn" data-id="${o.id}" style="margin-top:8px;">🚫 Отменить</button></div></div>`).join('');
      }

      function empAppealsPanel() {
        setTimeout(() => { const tab = document.getElementById('tabClientAppeals'); if (tab) tab.click(); }, 60);
        return `<div class="tabs-inner">
        <button class="tab-inner active" id="tabClientAppeals">👥 Обращения клиентов</button>
        <button class="tab-inner" id="tabEmpAppeals">👔 Обращения сотрудников</button>
        <button class="tab-inner" id="tabResolvedClient">✅ Решенные клиентские</button>
        <button class="tab-inner" id="tabResolvedEmp">✅ Решенные сотрудников</button>

      </div><div id="appealsSubContent"></div>`;

      function colleagueChatPanel() {
        const msgs = colleagueChats();
        return `<div class="card"><h3>👥 Чат коллег</h3><div class="chat-messages" id="colleagueMessages">${msgs.map(m => `<div class="chat-msg ${m.from === currentEmployee?.name ? 'mine' : 'other'}"><b>${m.from}:</b> ${m.text}</div>`).join('')}</div><div style="display:flex;gap:14px;"><input id="colleagueInput" style="flex:1;background:var(--input);border:2px solid var(--border);border-radius:18px;padding:16px;color:var(--text);"><button class="btn btn-primary" id="sendColleague" style="width:auto;">📤</button></div></div>`;
      }

      document.addEventListener('click', e => {
        if (e.target.classList.contains('tab-inner')) {
          document.querySelectorAll('.tab-inner').forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
          const sub = document.getElementById('appealsSubContent');
          if (e.target.id === 'tabClientAppeals') sub.innerHTML = appeals().map(a => `
          <div class="appeal-item"><b>🎫 #${a.id}</b> — ${a.status||'Открыто'}<div class="details" style="margin-top:16px;">
            <div class="detail-row"><span>Сотрудник:</span><span>${a.empName} (${a.empTab})</span></div>
            <div class="detail-row"><span>Клиент:</span><span>${a.clientName}</span></div>
            <div class="detail-row"><span>Проблема:</span><span>${a.problem}</span></div>
            ${a.replies ? a.replies.map(r => `<div class="reply-block">🔴 Ответ руководителя поддержки TUMIX:<br>${r}</div>`).join('') : ''}
            ${currentEmployee?.role==='admin' ? `<textarea id="replyText_${a.id}" placeholder="Ответ..." style="width:100%;margin-top:12px;background:var(--input);border:2px solid var(--border);border-radius:16px;padding:14px;color:var(--text);min-height:80px;"></textarea>
            <button class="btn btn-primary reply-btn" data-id="${a.id}" style="margin-top:8px;">📩 Ответить</button>
            <button class="btn btn-outline close-btn" data-id="${a.id}" style="margin-top:6px;">✅ Закрыть</button>
            <button class="btn btn-danger delete-btn" data-id="${a.id}" style="margin-top:6px;">🗑️ Удалить</button>
            <select id="statusSelect_${a.id}" style="width:100%;margin-top:6px;background:var(--input);border:2px solid var(--border);border-radius:14px;padding:8px;color:var(--text);">
              <option>Открыт</option><option>В работе</option><option>На проверке</option>
            </select>
            <button class="btn btn-outline change-status-btn" data-id="${a.id}" style="margin-top:4px;">🔄 Сменить статус</button>` : ''}
          </div></div>`).join('')||'<p>Нет обращений</p>';
          if (e.target.id === 'tabEmpAppeals') sub.innerHTML = empAppeals().filter(a=>a.empTab===currentEmployee?.tab||currentEmployee?.role==='admin').map(a=>`
          <div class="appeal-item"><b>👔 ${a.empName}</b> → Руководителю поддержки TUMIX<div class="details" style="margin-top:16px;">
            <div class="detail-row"><span>Табельный:</span><span>${a.empTab}</span></div>
            <div class="detail-row"><span>Текст:</span><span style="white-space:pre-wrap;">${a.text}</span></div>
            <div class="detail-row"><span>Статус:</span><span>${a.status||'Открыт'}</span></div>
            ${a.replies ? a.replies.map(r => `<div class="reply-block">🔴 Ответ руководителя поддержки TUMIX:<br>${r}</div>`).join('') : ''}
            ${currentEmployee?.role==='admin' ? `<textarea id="empReplyText_${a.empName}" placeholder="Ответ..." style="width:100%;margin-top:12px;background:var(--input);border:2px solid var(--border);border-radius:16px;padding:14px;color:var(--text);min-height:80px;"></textarea>
            <button class="btn btn-primary emp-reply-btn" data-emp="${a.empName}" style="margin-top:8px;">📩 Ответить</button>
            <button class="btn btn-outline close-emp-btn" data-emp="${a.empName}" style="margin-top:6px;">✅ Закрыть</button>
            <select id="empStatusSelect_${a.empName}" style="width:100%;margin-top:6px;background:var(--input);border:2px solid var(--border);border-radius:14px;padding:8px;color:var(--text);">
              <option>Открыт</option><option>В работе</option><option>На проверке</option>
            </select>
            <button class="btn btn-outline emp-change-status-btn" data-emp="${a.empName}" style="margin-top:4px;">🔄 Сменить статус</button>` : ''}
          </div></div>`).join('')||'<p>Нет обращений</p>';
          if (e.target.id === 'tabResolvedClient') sub.innerHTML = resolvedAppeals().map(a=>`<div class="appeal-item" onclick="this.querySelector('.details').classList.toggle('hidden')"><b>✅ #${a.id}</b><div class="details hidden" style="margin-top:12px;">${a.replies? a.replies.map(r=>`<div class="reply-block">🔴 ${r}</div>`).join('') : ''}${currentEmployee?.role==='admin'? `<button class="btn btn-danger delete-resolved-btn" data-id="${a.id}">🗑️ Удалить</button>` : ''}</div></div>`).join('')||'<p>Нет решенных</p>';
          if (e.target.id === 'tabResolvedEmp') sub.innerHTML = resolvedEmpAppeals().map(a=>`<div class="appeal-item" onclick="this.querySelector('.details').classList.toggle('hidden')"><b>✅ ${a.empName}</b><div class="details hidden" style="margin-top:12px;">${a.replies? a.replies.map(r=>`<div class="reply-block">🔴 ${r}</div>`).join('') : ''}${currentEmployee?.role==='admin'? `<button class="btn btn-danger delete-resolved-emp-btn" data-emp="${a.empName}">🗑️ Удалить</button>` : ''}</div></div>`).join('')||'<p>Нет решенных</p>';
          if (e.target.id === 'tabCreateClient') sub.innerHTML = `<div class="form-card"><h3>➕ Новое обращение клиента</h3><div class="input-column"><div class="field-group"><label>👤 ФИО сотрудника *</label><input id="eName"></div><div class="field-group"><label>🪪 Табельный номер *</label><input id="eTab" placeholder="TUM-0001"></div><div class="field-group"><label>👤 ФИО клиента *</label><input id="cName"></div><div class="field-group"><label>📧 Почта *</label><input id="cEmail"></div><div class="field-group"><label>📱 Телефон *</label><input id="cPhone" value="+7"></div><div class="field-group"><label>📝 Проблема *</label><textarea id="cProblem"></textarea></div><button class="btn btn-primary" id="submitClientAppeal">Оформить</button></div></div>`;
          if (e.target.id === 'tabCreateEmp') sub.innerHTML = `<div class="form-card"><h3>📝 Обращение сотрудника</h3><div class="input-column"><div class="field-group"><label>👤 ФИО сотрудника *</label><input id="eName2"></div><div class="field-group"><label>🪪 Табельный номер *</label><input id="eTab2" placeholder="TUM-0001"></div><div class="field-group"><label>📌 Кому</label><input disabled value="Руководителю поддержки TUMIX"></div><div class="field-group"><label>📝 Текст обращения</label><textarea id="eText" placeholder="Введите текст обращения..."></textarea></div><button class="btn btn-primary" id="submitEmpAppeal">✅ Оформить обращение</button></div></div>`;
        }
        if (e.target.classList.contains('reply-btn')) {
          e.stopPropagation();
          const id = e.target.dataset.id;
          const text = document.getElementById('replyText_' + id).value.trim();
          if (!text) return showToast('Введите текст ответа');
          const upd = appeals().map(a => a.id === id ? { ...a, replies: [...(a.replies||[]), text] } : a);
          store('tumix_appeals', upd);
          showToast('Ответ добавлен');
          document.getElementById('tabClientAppeals').click();
        }
        if (e.target.classList.contains('emp-reply-btn')) {
          e.stopPropagation();
          const emp = e.target.dataset.emp;
          const text = document.getElementById('empReplyText_' + emp).value.trim();
          if (!text) return showToast('Введите ответ');
          const upd = empAppeals().map(a => a.empName === emp ? { ...a, replies: [...(a.replies||[]), text] } : a);
          store('tumix_emp_appeals', upd);
          showToast('Ответ отправлен');
          document.getElementById('tabEmpAppeals').click();
        }
        if (e.target.classList.contains('close-btn')) {
          e.stopPropagation();
          const id = e.target.dataset.id;
          const app = appeals().find(a => a.id === id);
          if (!app) return;
          store('tumix_resolved_appeals', [...resolvedAppeals(), { ...app, status: 'Решено' }]);
          store('tumix_appeals', appeals().filter(a => a.id !== id));
          showToast('Обращение закрыто');
          document.getElementById('tabClientAppeals').click();
        }
        if (e.target.classList.contains('close-emp-btn')) {
          e.stopPropagation();
          const emp = e.target.dataset.emp;
          const app = empAppeals().find(a => a.empName === emp);
          if (!app) return;
          store('tumix_resolved_emp_appeals', [...resolvedEmpAppeals(), { ...app, status: 'Решено' }]);
          store('tumix_emp_appeals', empAppeals().filter(a => a.empName !== emp));
          showToast('Обращение сотрудника закрыто');
          document.getElementById('tabEmpAppeals').click();
        }
        if (e.target.classList.contains('change-status-btn')) {
          const id = e.target.dataset.id;
          const newStatus = document.getElementById('statusSelect_' + id).value;
          const upd = appeals().map(a => a.id === id ? { ...a, status: newStatus } : a);
          store('tumix_appeals', upd);
          showToast('Статус изменён');
          document.getElementById('tabClientAppeals').click();
        }
        if (e.target.classList.contains('emp-change-status-btn')) {
          const emp = e.target.dataset.emp;
          const newStatus = document.getElementById('empStatusSelect_' + emp).value;
          const upd = empAppeals().map(a => a.empName === emp ? { ...a, status: newStatus } : a);
          store('tumix_emp_appeals', upd);
          showToast('Статус изменён');
          document.getElementById('tabEmpAppeals').click();
        }
        if (e.target.classList.contains('edit-order-btn')) {
          e.stopPropagation();
          const id = e.target.dataset.id;
          showModal('Изменение статуса заказа #' + id, `<select id="statusSelect"><option>Оформлен</option><option>В пути</option><option>Доставлен</option><option>Отменён</option></select>`, (status) => {
            store('tumix_orders', orders().map(o => o.id === id ? { ...o, status } : o));
            showToast('Статус обновлён');
            renderEmployeeView('allOrders');
          });
        }
        if (e.target.classList.contains('cancel-order-btn')) {
          e.stopPropagation();
          const id = e.target.dataset.id;
          showModal('Отмена заказа #' + id, '<p>Вы уверены, что хотите отменить заказ?</p>', () => {
            store('tumix_orders', orders().map(o => o.id === id ? { ...o, status: 'Отменён' } : o));
            showToast('Заказ отменён');
            renderEmployeeView('allOrders');
          });
        }
        if (e.target.id === 'submitClientAppeal') {
          const app = { id: String(appeals().length + 1).padStart(7, '0'), empName: document.getElementById('eName').value, empTab: document.getElementById('eTab').value, clientName: document.getElementById('cName').value, clientEmail: document.getElementById('cEmail').value, clientPhone: document.getElementById('cPhone').value, problem: document.getElementById('cProblem').value, status: 'Открыто', replies: [] };
          store('tumix_appeals', [...appeals(), app]);
          showToast('Обращение создано');
          document.getElementById('tabClientAppeals').click();
        }
        if (e.target.id === 'submitEmpAppeal') {
          const text = document.getElementById('eText').value.trim();
          if (!text) return showToast('Введите текст обращения');
          store('tumix_emp_appeals', [...empAppeals(), { empName: document.getElementById('eName2').value, empTab: document.getElementById('eTab2').value, text, replies: [] }]);
          showToast('Обращение сотрудника создано');
          document.getElementById('tabEmpAppeals').click();
        }
        if (e.target.id === 'sendColleague') {
          const inp = document.getElementById('colleagueInput'); if (!inp.value.trim()) return;
          store('tumix_colleague_chats', [...colleagueChats(), { from: currentEmployee?.name, text: inp.value, timestamp: new Date().toISOString() }]);
          renderEmployeeView('colleagueChat');
        }
        if (e.target.id === 'sendChat') {
          const inp = document.getElementById('chatInput'); if (!inp.value.trim()) return;
          const msg = { from: 'client', text: inp.value, timestamp: new Date().toISOString() };
          store('tumix_support_chats', [...supportChats(), msg]);
          const d = document.createElement('div'); d.className = 'chat-msg mine'; d.textContent = inp.value;
          document.getElementById('chatMsgs').appendChild(d);
          if (supportChats().filter(m=>m.from==='support').length === 0) {
            setTimeout(() => {
              const autoMsg = { from: 'support', text: '👩‍💼 Оператор скоро ответит вам, пожалуйста подождите.', timestamp: new Date().toISOString() };
              store('tumix_support_chats', [...supportChats(), autoMsg]);
              const r = document.createElement('div'); r.className = 'chat-msg other'; r.textContent = autoMsg.text;
              document.getElementById('chatMsgs').appendChild(r);
            }, 900);
          }
          inp.value = ''; document.getElementById('chatMsgs').scrollTop = document.getElementById('chatMsgs').scrollHeight;
        }
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && document.activeElement?.id === 'chatInput') { e.preventDefault(); document.getElementById('sendChat')?.click(); }
        if (e.key === 'Enter' && document.activeElement?.id === 'colleagueInput') { e.preventDefault(); document.getElementById('sendColleague')?.click(); }
      });

      if (!currentClient && !currentEmployee) renderAuth();
    })();
  </script>
</body>
</html>
