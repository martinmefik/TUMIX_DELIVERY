<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>TUMIX — Доставка с душой</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23F15A2C'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold' font-size='18'>T</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js">
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(18, 18, 38, 0.7);
      border-radius: 20px;
      margin: 10px;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #F15A2C, #ff8a5c, #F15A2C);
      border-radius: 20px;
      border: 3px solid rgba(0, 0, 0, 0.3);
      box-shadow: 0 0 16px rgba(241, 90, 44, 0.6);
      transition: all 0.5s ease;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #ff7043, #ffaa80, #ff7043);
      box-shadow: 0 0 24px rgba(241, 90, 44, 0.9);
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #03030a;
      background-image: radial-gradient(ellipse at 20% 30%, rgba(241, 90, 44, 0.18) 0%, transparent 60%), radial-gradient(ellipse at 80% 60%, rgba(255, 160, 80, 0.14) 0%, transparent 60%), radial-gradient(ellipse at 40% 85%, rgba(140, 100, 255, 0.12) 0%, transparent 60%), radial-gradient(ellipse at 70% 15%, rgba(255, 200, 150, 0.10) 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: #e8e4f0;
      animation: backgroundShift 30s ease infinite alternate;
    }

    @keyframes backgroundShift {
      0% {
        background-position: 0% 0%, 100% 100%, 50% 50%, 0% 100%;
      }
      100% {
        background-position: 100% 100%, 0% 0%, 50% 50%, 100% 0%;
      }
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes fadeSlideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes pulse {
      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(241, 90, 44, 0.7);
      }
      50% {
        box-shadow: 0 0 0 25px rgba(241, 90, 44, 0);
      }
    }
    @keyframes shimmer {
      0% {
        background-position: -400% center;
      }
      100% {
        background-position: 400% center;
      }
    }
    @keyframes borderGlow {
      0%,
      100% {
        border-color: rgba(241, 90, 44, 0.25);
        box-shadow: 0 0 20px rgba(241, 90, 44, 0.08);
      }
      50% {
        border-color: rgba(241, 90, 44, 0.8);
        box-shadow: 0 0 40px rgba(241, 90, 44, 0.25);
      }
    }
    @keyframes cardFloat {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-5px);
      }
    }

    .app-wrapper {
      width: 100%;
      max-width: 1500px;
      min-height: 95vh;
      background: rgba(10, 10, 24, 0.88);
      backdrop-filter: blur(44px);
      -webkit-backdrop-filter: blur(44px);
      border-radius: 56px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 70px 140px rgba(0, 0, 0, 0.95), inset 0 2px 0 rgba(255, 255, 255, 0.07), inset 0 -2px 0 rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1), borderGlow 7s infinite;
    }

    .logo-header {
      padding: 18px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(8, 8, 22, 0.45);
      backdrop-filter: blur(20px);
      flex-wrap: wrap;
      gap: 10px;
    }
    .logo-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-text {
      font-size: clamp(24px, 5vw, 34px);
      font-weight: 900;
      letter-spacing: -1.2px;
      background: linear-gradient(135deg, #f5dfc8, #c8b098, #f5dfc8, #e0c8a8);
      background-size: 400% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 5s linear infinite;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .support-email {
      color: #F15A2C;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      background: rgba(241,90,44,0.1);
      padding: 8px 16px;
      border-radius: 20px;
      transition: 0.3s;
    }
    .logout-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(255, 255, 255, 0.2);
      color: #c8bca8;
      padding: 10px 24px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.4s ease;
    }
    .logout-btn:hover {
      background: #c0392b;
      color: white;
      border-color: #e74c3c;
      box-shadow: 0 14px 34px rgba(192, 57, 43, 0.6);
      transform: translateY(-3px);
    }

    .auth-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      animation: fadeInUp 0.7s ease;
    }
    .auth-tabs {
      display: flex;
      gap: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px;
      border-radius: 30px;
      margin-bottom: 30px;
    }
    .auth-tab {
      padding: 12px 30px;
      border-radius: 24px;
      border: none;
      background: transparent;
      color: #9c90ac;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.4s ease;
    }
    .auth-tab.active {
      background: #F15A2C;
      color: #fff;
      box-shadow: 0 12px 28px rgba(241, 90, 44, 0.7);
    }

    .auth-card,
    .form-card {
      background: rgba(18, 18, 36, 0.82);
      backdrop-filter: blur(32px);
      border-radius: 36px;
      padding: 32px;
      width: 100%;
      max-width: 500px;
      border: 2px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 35px 60px rgba(0, 0, 0, 0.8);
      animation: cardFloat 7s ease-in-out infinite;
    }
    .auth-card h2,
    .form-card h3 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 24px;
      text-align: center;
      color: #efe6da;
    }

    .input-column {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field-group label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #b8a8c8;
    }
    .field-group input,
    .field-group textarea {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      font-size: 15px;
      color: #f2e8dc;
      outline: none;
      transition: all 0.4s ease;
      font-family: inherit;
      resize: vertical;
    }
    .field-group input:focus,
    .field-group textarea:focus {
      border-color: #F15A2C;
      box-shadow: 0 0 0 6px rgba(241, 90, 44, 0.3);
      background: rgba(255, 255, 255, 0.09);
    }

    .btn {
      padding: 15px 24px;
      border-radius: 22px;
      border: none;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.4s ease;
      width: 100%;
      margin-top: 14px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #F15A2C, #e04820);
      color: white;
      box-shadow: 0 14px 30px rgba(241, 90, 44, 0.6);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(241, 90, 44, 0.8);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.28);
      color: #d4cadc;
    }
    .btn-danger {
      background: linear-gradient(135deg, #c0392b, #a93226);
      color: white;
    }
    .link-text {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #988ea8;
    }
    .link-text a {
      color: #F15A2C;
      text-decoration: none;
      font-weight: 700;
    }

    .toast-notification {
      position: fixed;
      top: 24px;
      right: 24px;
      background: rgba(16, 16, 34, 0.96);
      backdrop-filter: blur(28px);
      border: 2px solid #F15A2C;
      border-radius: 22px;
      padding: 18px 28px;
      color: #f2e6d8;
      font-weight: 700;
      font-size: 14px;
      z-index: 9999;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 20px;
    }
    .modal-window {
      background: rgba(22, 22, 44, 0.96);
      border: 2px solid rgba(241, 90, 44, 0.5);
      border-radius: 28px;
      padding: 28px;
      max-width: 600px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
    }
    .modal-window h3 {
      margin-bottom: 18px;
      color: #efe6da;
    }
    .modal-window select {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      color: white;
      font-size: 15px;
      margin-bottom: 18px;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .dashboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    @media (min-width: 768px) {
      .dashboard {
        flex-direction: row;
      }
    }
    .sidebar {
      width: 100%;
      background: rgba(10, 10, 26, 0.7);
      backdrop-filter: blur(26px);
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }
    @media (min-width: 768px) {
      .sidebar {
        width: 260px;
        flex-direction: column;
        padding: 28px 16px;
        border-right: 1px solid rgba(255, 255, 255, 0.07);
        border-bottom: none;
      }
    }
    .sidebar-btn {
      background: transparent;
      border: none;
      color: #b2a4bc;
      padding: 12px 18px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: all 0.4s ease;
      flex: 1 1 auto;
    }
    .sidebar-btn.active {
      background: rgba(241, 90, 44, 0.38);
      color: #F15A2C;
      border-left: 3px solid #F15A2C;
    }
    .content-area {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: rgba(6, 6, 18, 0.45);
    }
    .card {
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(22px);
      border-radius: 28px;
      padding: 28px;
      border: 2px solid rgba(255, 255, 255, 0.09);
      margin-bottom: 20px;
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0;
    }
    .checkbox-pill {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.18);
      border-radius: 30px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: 0.4s;
    }
    .checkbox-pill.checked {
      background: rgba(241, 90, 44, 0.4);
      border-color: #F15A2C;
      color: #ffb08c;
    }
    .order-item,
    .appeal-item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 18px;
      margin: 12px 0;
      border-left: 5px solid #F15A2C;
      cursor: pointer;
      transition: 0.4s;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .hidden {
      display: none !important;
    }

    .tabs-inner {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .tab-inner {
      padding: 10px 18px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(255, 255, 255, 0.14);
      color: #b0a0b8;
      cursor: pointer;
      transition: 0.4s;
      font-weight: 700;
      font-size: 13px;
    }
    .tab-inner.active {
      background: #F15A2C;
      color: white;
      border-color: #F15A2C;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-wrap: wrap;
      gap: 4px;
    }
    .detail-row span:first-child {
      font-weight: 700;
      color: #b8a8c8;
      min-width: 100px;
    }
    .detail-row span:last-child {
      color: #f2e8dc;
      text-align: left;
      flex: 1;
      word-break: break-word;
    }

    #map {
      height: 280px;
      border-radius: 20px;
      margin: 16px 0;
      border: 2px solid rgba(255, 255, 255, 0.14);
    }

    .admin-reply {
      color: #e74c3c;
      margin-top: 10px;
      padding: 12px;
      background: rgba(231, 76, 60, 0.18);
      border-radius: 14px;
      border-left: 4px solid #e74c3c;
    }
    .reply-block {
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 12px;
      border-left: 3px solid #F15A2C;
      word-break: break-word;
    }

    .chat-messages {
      max-height: 380px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 18px;
    }
    .chat-msg {
      padding: 12px 18px;
      border-radius: 18px;
      margin: 8px 0;
      max-width: 80%;
      clear: both;
      word-break: break-word;
    }
    .chat-msg.mine {
      background: #F15A2C;
      color: white;
      float: right;
    }
    .chat-msg.other {
      background: rgba(255, 255, 255, 0.12);
      color: #e0d6cc;
      float: left;
    }
  </style>
</head>
<body>
  <div class="app-wrapper" id="appWrapper">
    <div class="logo-header" id="logoHeader">
      <div class="logo-left">
        <span class="logo-text" id="dynamicLogo">TUMIX CLIENT</span>
      </div>
      <div class="header-right">
        <a href="mailto:tumix.support@gmail.com" class="support-email">📧 tumix.support@gmail.com</a>
        <button class="logout-btn hidden" id="logoutBtn">🚪 Выйти</button>
      </div>
    </div>

    <div id="authScreen" class="auth-screen">
      <div class="auth-tabs">
        <button class="auth-tab active" id="clientTab">👤 Клиент</button>
        <button class="auth-tab" id="employeeTab">🛡️ Сотрудник</button>
      </div>
      <div id="authFormsContainer" class="auth-card"></div>
    </div>

    <div id="clientDashboard" class="dashboard hidden">
      <div class="sidebar">
        <button class="sidebar-btn active" data-view="delivery">📦 Доставка</button>
        <button class="sidebar-btn" data-view="appeals">📋 Мои обращения</button>
        <button class="sidebar-btn" data-view="orders">📑 Мои заказы</button>
        <button class="sidebar-btn" data-view="support">💬 Поддержка</button>
        <button class="sidebar-btn" data-view="rules">📜 Правила</button>
      </div>
      <div class="content-area" id="clientContent"></div>
    </div>

    <div id="employeeDashboard" class="dashboard hidden">
      <div class="sidebar">
        <button class="sidebar-btn active" data-view="empChat">💬 Чат с клиентами</button>
        <button class="sidebar-btn" data-view="empAppeals">📋 Все обращения</button>
        <button class="sidebar-btn" data-view="allOrders">📦 Все заказы</button>
        <button class="sidebar-btn" data-view="colleagueChat">👥 Чат коллег</button>
        <button class="sidebar-btn" data-view="empRules">📜 Правила</button>
      </div>
      <div class="content-area" id="employeeContent"></div>
    </div>
  </div>

  <script>
    (() => {
      const store = (k, v) => v !== undefined ? localStorage.setItem(k, JSON.stringify(v)) : JSON.parse(localStorage.getItem(k) || 'null');
      const users = () => store('tumix_users') || [];
      const orders = () => store('tumix_orders') || [];
      const appeals = () => store('tumix_appeals') || [];
      const empAppeals = () => store('tumix_emp_appeals') || [];
      const resolvedAppeals = () => store('tumix_resolved_appeals') || [];
      const resolvedEmpAppeals = () => store('tumix_resolved_emp_appeals') || [];
      const colleagueChats = () => {
        const chats = store('tumix_colleague_chats') || [];
        const now = Date.now();
        const filtered = chats.filter(m => now - new Date(m.timestamp).getTime() < 172800000);
        if (filtered.length !== chats.length) store('tumix_colleague_chats', filtered);
        return filtered;
      };
      const supportChats = () => store('tumix_support_chats') || [];
      const agreementAccepted = () => localStorage.getItem('tumix_agreement_accepted') === 'true';

      let currentClient = null,
        currentEmployee = null;
      const TEST_EMP = { tab: 'TUM-0001', password: 'Password0001', name: 'Алексей Смирнов', role: 'support' };
      const ADMIN_EMP = { tab: 'OWNER_MARTIN_MEFIKOV0001', password: 'MARTIN_MEFIKOV0001', name: 'Мартин Мефиков',
        role: 'admin' };

      const dynamicLogo = document.getElementById('dynamicLogo');

      function showToast(msg) {
        const old = document.querySelector('.toast-notification');
        if (old) old.remove();
        const t = document.createElement('div');
        t.className = 'toast-notification';
        t.textContent = '✨ ' + msg;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0';
          t.style.transition = '0.5s';
          setTimeout(() => t.remove(), 500); }, 3000);
      }

      function showModal(title, content, onConfirm) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
        <div class="modal-window">
          <h3>${title}</h3>
          ${content}
          <div class="modal-buttons">
            <button class="btn btn-outline cancel-modal" style="width:auto;">Отмена</button>
            <button class="btn btn-primary confirm-modal" style="width:auto;">Подтвердить</button>
          </div>
        </div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('.cancel-modal').addEventListener('click', () => overlay.remove());
        overlay.querySelector('.confirm-modal').addEventListener('click', () => {
          const select = overlay.querySelector('select');
          const value = select ? select.value : true;
          overlay.remove();
          if (onConfirm) onConfirm(value);
        });
      }

      function showRulesModal() {
        const rules = `
        <div style="max-height:60vh;overflow-y:auto;padding-right:10px;">
          <p><b style="color:#e74c3c;">1. При использовании услуг компании TUMIX пользователь соглашается на обработку и хранение персональных данных. Данные хранятся в соответствии с Федеральным законом от 27 июля 2006 года №152-ФЗ «О персональных данных».</b></p>
          <p><b style="color:#e74c3c;">2. Клиент подтверждает, что в грузе нет ничего запрещённого. Список запрещённого к перевозке:</b> <span style="color:#e74c3c;font-weight:700;">Оружие (любое), Животные, Легковоспламеняющиеся вещества, Взрывчатые вещества, Лекарственные препараты, Наркотические и психотропные препараты, Денежные средства любой валюты, Вещества кислотного происхождения, Перекись водорода, Скоропортящиеся продукты (СПП), Дорогое ювелирное украшение, Хрупкие предметы без специальной упаковки.</span></p>
          <p>3. Компания TUMIX несёт полную ответственность за состояние груза при транспортировке. В случае его повреждения или утраты, пожалуйста, обратитесь в поддержку по вкладке «Поддержка».</p>
          <p>4. Если груз был повреждён во время транспортировки не по причине курьера, а из-за плохой упаковки товара (летает в коробке, сильно упакован и повреждён из-за давления и т. п.), то ответственность перекладывается на заказчика.</p>
          <p>5. Заказчик обязан предоставить достоверную информацию и подлинные данные. В случае если данные неверны, а курьер уже забрал заказ, заказ будет отменён, посылка возвращена и удержана комиссия.</p>
          <p>6. В случае кражи содержимого груза обратитесь на почту <b>tumix.support@gmail.com</b>. Необходимы будут фото доказательства при сборке.</p>
          <p>7. Курьер имеет право проверить, что находится в перевозке и не попадает ли ничего в список запрещённого.</p>
          <p style="background:rgba(255,215,0,0.15);padding:10px;border-radius:10px;"><b style="color:#ffd700;">8. Если приехал другой автомобиль или пришёл другой человек за заказом, не отдавайте заказ! Напишите в поддержку о случившемся, и мы подберём вам нового курьера. Передача груза курьеру, который не соответствует описанному в заказе, ОПАСНА – это могут быть мошенники, которые могут украсть ваш товар!</b></p>
          <p>9. Если курьер или работник вам нагрубили, необходимо обратиться в поддержку. После регистрации заявления работник будет наказан.</p>
          <p>10. Компания TUMIX оставляет за собой право изменять условия пользования и тарифы с уведомлением на сайте.</p>
          <p>11. Клиент имеет право на возврат средств в соответствии с условиями договора-оферты.</p>
        </div>`;
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `<div class="modal-window"><h3>📜 Правила пользования</h3>${rules}<div class="modal-buttons"><button class="btn btn-primary cancel-modal" style="width:auto;">Закрыть</button></div></div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('.cancel-modal').addEventListener('click', () => overlay.remove());
      }

      function showAgreementModal(callback) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
        <div class="modal-window">
          <h3>📜 Пользовательское соглашение</h3>
          <div style="max-height:50vh;overflow-y:auto;padding-right:10px;margin-bottom:20px;">
            <p>Настоящее соглашение регулирует обработку и хранение персональных данных пользователей сервиса TUMIX в соответствии с Федеральным законом от 27 июля 2006 года №152-ФЗ «О персональных данных». Продолжая регистрацию, вы даёте согласие на сбор, обработку и хранение ваших персональных данных (имя, телефон, адрес электронной почты) в целях оказания услуг доставки.</p>
            <p>Вы также подтверждаете, что ознакомлены с <b>Правилами пользования</b> сервисом TUMIX.</p>
          </div>
          <div class="modal-buttons">
            <button class="btn btn-danger decline-agreement" style="width:auto;">Отклонить</button>
            <button class="btn btn-primary accept-agreement" style="width:auto;">Принять</button>
          </div>
        </div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('.accept-agreement').addEventListener('click', () => {
          localStorage.setItem('tumix_agreement_accepted', 'true');
          overlay.remove();
          if (callback) callback(true);
        });
        overlay.querySelector('.decline-agreement').addEventListener('click', () => {
          overlay.remove();
          if (callback) callback(false);
        });
      }

      const authScreen = document.getElementById('authScreen');
      const clientDash = document.getElementById('clientDashboard');
      const empDash = document.getElementById('employeeDashboard');
      const authForms = document.getElementById('authFormsContainer');
      const logoutBtn = document.getElementById('logoutBtn');

      function updateUI() {
        if (currentClient) {
          authScreen.classList.add('hidden');
          clientDash.classList.remove('hidden');
          empDash.classList.add('hidden');
          logoutBtn.classList.remove('hidden');
          dynamicLogo.textContent = 'TUMIX CLIENT';
          localStorage.setItem('tumix_session', JSON.stringify({ type: 'client', id: currentClient.id }));
        } else if (currentEmployee) {
          authScreen.classList.add('hidden');
          empDash.classList.remove('hidden');
          clientDash.classList.add('hidden');
          logoutBtn.classList.remove('hidden');
          dynamicLogo.textContent = 'TUMIX SUPPORT';
          localStorage.setItem('tumix_session', JSON.stringify({ type: 'employee', tab: currentEmployee.tab }));
        } else {
          authScreen.classList.remove('hidden');
          clientDash.classList.add('hidden');
          empDash.classList.add('hidden');
          logoutBtn.classList.add('hidden');
          dynamicLogo.textContent = 'TUMIX';
          localStorage.removeItem('tumix_session');
        }
      }

      logoutBtn.addEventListener('click', () => { currentClient = null;
        currentEmployee = null;
        updateUI();
        renderAuth(); });

      const session = JSON.parse(localStorage.getItem('tumix_session') || 'null');
      if (session) {
        if (session.type === 'client') { const u = users().find(x => x.id === session.id); if (u) { currentClient =
            u;
            updateUI();
            renderClientView('delivery'); } } else if (session.type === 'employee') { if (session.tab === TEST_EMP
            .tab) currentEmployee = { ...TEST_EMP }; else if (session.tab === ADMIN_EMP.tab) currentEmployee = { ...
            ADMIN_EMP }; if (currentEmployee) { updateUI();
            renderEmployeeView('empChat'); } }
      }

      let authMode = 'client';
      document.getElementById('clientTab').addEventListener('click', () => { authMode = 'client';
        renderAuth(); });
      document.getElementById('employeeTab').addEventListener('click', () => { authMode = 'employee';
        renderAuth(); });

      function renderAuth() {
        document.getElementById('clientTab').classList.toggle('active', authMode === 'client');
        document.getElementById('employeeTab').classList.toggle('active', authMode === 'employee');
        if (authMode === 'client') {
          authForms.innerHTML = `
          <h2>Вход для клиентов</h2>
          <div class="input-column">
            <div class="field-group"><label>📧 Почта</label><input type="email" id="loginEmail" autocomplete="off"></div>
            <div class="field-group"><label>🔒 Пароль</label><input type="password" id="loginPass" autocomplete="off"></div>
          </div>
          <button class="btn btn-primary" id="loginClientBtn">Войти</button>
          <p class="link-text"><a href="#" id="showRegister">Регистрация</a></p>`;
          document.getElementById('loginClientBtn').addEventListener('click', () => {
            const e = document.getElementById('loginEmail').value.trim(),
              p = document.getElementById('loginPass').value.trim();
            const u = users().find(x => x.email === e && x.password === p);
            if (u) { currentClient = u;
              updateUI();
              renderClientView('delivery'); } else showToast('Неверные данные');
          });
          document.getElementById('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            if (!agreementAccepted()) {
              showAgreementModal((accepted) => {
                if (accepted) {
                  showToast('Соглашение принято! Теперь вы можете зарегистрироваться.');
                  document.getElementById('showRegister').click();
                } else {
                  showToast('Регистрация невозможна без принятия соглашения.');
                }
              });
              return;
            }
            authForms.innerHTML = `
            <h2>Регистрация</h2>
            <div class="input-column">
              <div class="field-group"><label>Имя *</label><input id="regName"></div>
              <div class="field-group"><label>Почта *</label><input type="email" id="regEmail"></div>
              <div class="field-group"><label>Телефон *</label><input type="tel" id="regPhone" value="+7"></div>
              <div class="field-group"><label>Пароль *</label><input type="password" id="regPass"></div>
            </div>
            <button class="btn btn-primary" id="registerBtn">Зарегистрироваться</button>
            <p class="link-text"><a href="#" id="backToLogin">Назад</a></p>`;
            document.getElementById('registerBtn').addEventListener('click', () => {
              const n = document.getElementById('regName').value.trim(),
                em = document.getElementById('regEmail').value.trim(),
                ph = document.getElementById('regPhone').value.trim(),
                pw = document.getElementById('regPass').value.trim();
              if (!n || !em || !ph || !pw) return showToast('Заполните все поля');
              let u = users();
              if (u.find(x => x.email === em)) return showToast('Почта занята');
              u.push({ id: Date.now().toString(), name: n, email: em, phone: ph, password: pw });
              store('tumix_users', u);
              showToast('Регистрация успешна!');
              renderAuth();
            });
            document.getElementById('backToLogin').addEventListener('click', (ev) => { ev.preventDefault();
              renderAuth(); });
          });
        } else {
          authForms.innerHTML = `
          <h2>Вход для сотрудников</h2>
          <div class="input-column">
            <div class="field-group"><label>Табельный номер</label><input id="empTab" placeholder="TUM-0001"></div>
            <div class="field-group"><label>Пароль</label><input type="password" id="empPass"></div>
          </div>
          <button class="btn btn-primary" id="loginEmpBtn">Войти</button>`;
          document.getElementById('loginEmpBtn').addEventListener('click', () => {
            const tab = document.getElementById('empTab').value.trim(),
              pass = document.getElementById('empPass').value.trim();
            if (tab === TEST_EMP.tab && pass === TEST_EMP.password) currentEmployee = { ...TEST_EMP };
            else if (tab === ADMIN_EMP.tab && pass === ADMIN_EMP.password) currentEmployee = { ...ADMIN_EMP };
            else return showToast('Неверные данные');
            updateUI();
            renderEmployeeView('empChat');
          });
        }
      }

      document.querySelectorAll('#clientDashboard .sidebar-btn').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('#clientDashboard .sidebar-btn').forEach(x => x.classList.remove(
          'active'));
        b.classList.add('active');
        if (b.dataset.view === 'rules') showRulesModal();
        else renderClientView(b.dataset.view);
      }));

      document.querySelectorAll('#employeeDashboard .sidebar-btn').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('#employeeDashboard .sidebar-btn').forEach(x => x.classList.remove(
          'active'));
        b.classList.add('active');
        if (b.dataset.view === 'empRules') showRulesModal();
        else renderEmployeeView(b.dataset.view);
      }));

      let deliveryMap = null,
        routingControl = null;

      function initDeliveryMap() {
        setTimeout(() => {
          const mapEl = document.getElementById('map');
          if (!mapEl || deliveryMap) return;
          deliveryMap = L.map('map').setView([55.7558, 37.6173], 10);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' })
            .addTo(deliveryMap);
          deliveryMap.invalidateSize();
        }, 600);
      }

      async function geocodeAddress(address) {
        try {
          const resp = await fetch(
            `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1&accept-language=ru`
            );
          const data = await resp.json();
          if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon),
            display: data[0].display_name };
          return null;
        } catch (e) { return null; }
      }

      function deliveryForm() {
        return `<div class="card"><h3>📦 Оформление доставки</h3><div class="input-column">
        <div class="field-group"><label>👤 ФИО отправителя *</label><input id="sName" autocomplete="off"></div>
        <div class="field-group"><label>📱 Телефон отправителя *</label><input id="sPhone" value="+7" autocomplete="off"></div>
        <div class="field-group"><label>📍 Адрес отправки *</label><input id="sAddr" placeholder="Москва, ул. Тверская, 1" autocomplete="off"></div>
        <div class="field-group"><label>👤 ФИО получателя *</label><input id="rName" autocomplete="off"></div>
        <div class="field-group"><label>📱 Телефон получателя *</label><input id="rPhone" value="+7" autocomplete="off"></div>
        <div class="field-group"><label>📍 Адрес получателя *</label><input id="rAddr" placeholder="Москва, ул. Арбат, 10" autocomplete="off"></div>
        <div class="field-group"><label>📦 Содержимое *</label><input id="contentDesc" autocomplete="off"></div>
        <div class="checkbox-group" id="packCheckboxes">
          <label class="checkbox-pill"><input type="checkbox" value="Пакет" hidden> Пакет (60₽)</label>
          <label class="checkbox-pill"><input type="checkbox" value="Конверт" hidden> Конверт (90₽)</label>
          <label class="checkbox-pill"><input type="checkbox" value="Коробка S" hidden> Коробка S (120₽)</label>
          <label class="checkbox-pill"><input type="checkbox" value="Коробка M" hidden> Коробка M (220₽)</label>
          <label class="checkbox-pill"><input type="checkbox" value="Коробка L" hidden> Коробка L (280₽)</label>
          <label class="checkbox-pill"><input type="checkbox" value="Коробка XL" hidden> Коробка XL (350₽)</label>
        </div>
        <div id="map"></div>
        <button class="btn btn-primary" id="calcDelivery">🧮 Рассчитать маршрут и стоимость</button>
        <div id="priceDetails"></div></div></div>`;
      }

      document.addEventListener('click', e => {
        if (e.target.id === 'calcDelivery') {
          const packs = [...document.querySelectorAll('#packCheckboxes input:checked')].map(c => c.value);
          if (!packs.length) return showToast('Выберите упаковку');
          const sAddr = document.getElementById('sAddr').value.trim(),
            rAddr = document.getElementById('rAddr').value.trim();
          if (!sAddr || !rAddr) return showToast('Заполните адреса');
          document.getElementById('priceDetails').innerHTML =
            '<p>🔄 Строим автомобильный маршрут...</p>';
          Promise.all([geocodeAddress(sAddr), geocodeAddress(rAddr)]).then(([from, to]) => {
            if (!from || !to) { document.getElementById('priceDetails').innerHTML =
                '<p style="color:#ff7043;">❌ Адрес не найден</p>'; return; }
            if (deliveryMap) {
              if (routingControl) deliveryMap.removeControl(routingControl);
              routingControl = L.Routing.control({
                waypoints: [L.latLng(from.lat, from.lng), L.latLng(to.lat, to.lng)],
                routeWhileDragging: false,
                showAlternatives: false,
                lineOptions: { styles: [{ color: '#F15A2C', weight: 6 }] }
              }).addTo(deliveryMap);
              routingControl.on('routesfound', function(ev) {
                const dist = Math.round(ev.routes[0].summary.totalDistance / 1000);
                const pr = { Пакет: 60, Конверт: 90, 'Коробка S': 120, 'Коробка M': 220, 'Коробка L': 280,
                  'Коробка XL': 350 };
                let pc = packs.reduce((s, p) => s + pr[p], 0),
                  km = dist * 22,
                  serv = 29,
                  total = pc + km + serv;
                document.getElementById('priceDetails').innerHTML =
                  `<div class="card"><div class="detail-row"><span>📦 Упаковка:</span><span>${pc} ₽</span></div><div class="detail-row"><span>🛣️ По дороге:</span><span>${dist} км × 22₽ = ${km} ₽</span></div><div class="detail-row"><span>🔧 Сервис:</span><span>29 ₽</span></div><h3>💰 Итого: ${total} ₽</h3><button class="btn btn-primary" id="confirmOrder">Оформить</button></div>`;
              });
            }
          });
        }
        if (e.target.id === 'confirmOrder') {
          const ords = orders();
          const newId = String(ords.length + 1).padStart(8, '0');
          store('tumix_orders', [...ords, { id: newId, clientId: currentClient.id, sender: document.getElementById(
              'sName').value, sPhone: document.getElementById('sPhone').value, sAddr: document.getElementById(
              'sAddr').value, recName: document.getElementById('rName').value, rPhone: document.getElementById(
              'rPhone').value, rAddr: document.getElementById('rAddr').value, content: document.getElementById(
              'contentDesc').value, packs: [...document.querySelectorAll('#packCheckboxes input:checked')].map(c =>
              c.value), status: 'Оформлен', date: new Date().toLocaleString('ru-RU') }]);
          showToast('Заказ #' + newId + ' оформлен!');
          document.querySelector('#clientDashboard .sidebar-btn[data-view="orders"]').click();
        }
        if (e.target.closest('.checkbox-pill')) { const pill = e.target.closest('.checkbox-pill'),
            cb = pill.querySelector('input');
          cb.checked = !cb.checked;
          pill.classList.toggle('checked', cb.checked); }
      });

      function clientOrders() {
        return `<h3>📑 Мои заказы</h3>` + orders().filter(o => o.clientId === currentClient?.id).map(o =>
          `<div class="order-item" onclick="this.querySelector('.details').classList.toggle('hidden')"><b>#${o.id}</b> — ${o.status}<div class="details hidden">${['sender','sPhone','sAddr','recName','rPhone','rAddr','content'].map(k=>`<div class="detail-row"><span>${k}:</span><span>${o[k]}</span></div>`).join('')}</div></div>`
          ).join('') || '<p>Нет заказов</p>';
      }

      function clientAppeals() {
        return `<h3>📋 Мои обращения</h3>` + appeals().filter(a => a.clientEmail === currentClient?.email).map(a =>
          `<div class="appeal-item" onclick="event.stopPropagation(); this.querySelector('.details').classList.toggle('hidden')"><b>#${a.id}</b> — ${a.status||'Открыто'}<div class="details hidden"><div class="detail-row"><span>Проблема:</span><span>${a.problem}</span></div>${a.replies ? a.replies.map(r => `<div class="admin-reply">🔴 Ответ руководителя поддержки TUMIX:<br>${r}</div>`).join('') : ''}</div></div>`
          ).join('') || '<p>Нет обращений</p>';

      function supportChat() {
        const msgs = supportChats();
        return `<div class="card"><h3>💬 Поддержка</h3><div class="chat-messages" id="chatMsgs">${msgs.length ? msgs.map(m => `<div class="chat-msg ${m.from === 'client' ? 'mine' : 'other'}">${m.text}</div>`).join('') : '<div class="chat-msg other">Здравствуйте! Это поддержка TUMIX.</div>'}</div><div style="display:flex;gap:10px;"><input id="chatInput" style="flex:1;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.14);border-radius:14px;padding:12px;color:white;"><button class="btn btn-primary" id="sendChat" style="width:auto;">📤</button></div></div>`;
      }

      function renderClientView(view) {

      document.addEventListener('click', e => {

          <div class="detail-row"><span>Проблема:</span><span>${a.problem}</span></div>
          ${a.replies ? a.replies.map(r => `<div class="reply-block">🔴 Ответ руководителя поддержки TUMIX:<br>${r}</div>`).join('') : ''}
          ${currentEmployee?.role==='admin' ? `<textarea id="replyText_${a.id}" placeholder="Ответ..." style="width:100%;margin-top:8px;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.18);border-radius:14px;padding:10px;color:white;"></textarea>
          <button class="btn btn-primary reply-btn" data-id="${a.id}">📩 Ответить</button>
          <button class="btn btn-outline close-btn" data-id="${a.id}">✅ Закрыть</button>
          <button class="btn btn-danger delete-btn" data-id="${a.id}">🗑️ Удалить</button>
          <select id="statusSelect_${a.id}" style="width:100%;margin-top:6px;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.18);border-radius:14px;padding:8px;color:white;">
            <option>Открыт</option><option>В работе</option><option>На проверке информации</option>
          </select>
          <button class="btn btn-outline change-status-btn" data-id="${a.id}" style="margin-top:4px;">🔄 Сменить статус</button>` : ''}
          </div></div>`).join('')||'<p>Нет обращений</p>';
          if (e.target.id === 'tabEmpAppeals') sub.innerHTML = empAppeals().filter(a=>a.empTab===currentEmployee?.tab||currentEmployee?.role==='admin').map(a=>`
          <div class="appeal-item"><b>👔 ${a.empName}</b> → Руководителю поддержки TUMIX<div class="details" style="margin-top:12px;">
          <div class="detail-row"><span>Табельный:</span><span>${a.empTab}</span></div>
          <div class="detail-row"><span>Текст:</span><span>${a.text}</span></div>
          ${a.replies ? a.replies.map(r => `<div class="reply-block">🔴 Ответ руководителя поддержки TUMIX:<br>${r}</div>`).join('') : ''}
          ${currentEmployee?.role==='admin' ? `<textarea id="empReplyText_${a.empName}" placeholder="Ответ..." style="width:100%;margin-top:8px;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.18);border-radius:14px;padding:10px;color:white;"></textarea>
          <button class="btn btn-primary emp-reply-btn" data-emp="${a.empName}">📩 Ответить</button>
          <button class="btn btn-outline close-emp-btn" data-emp="${a.empName}">✅ Закрыть</button>
          <select id="empStatusSelect_${a.empName}" style="width:100%;margin-top:6px;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.18);border-radius:14px;padding:8px;color:white;">
            <option>Открыт</option><option>В работе</option><option>На проверке информации</option>
          </select>
          <button class="btn btn-outline emp-change-status-btn" data-emp="${a.empName}" style="margin-top:4px;">🔄 Сменить статус</button>` : ''}
          </div></div>`).join('')||'<p>Нет обращений</p>';
        }
        if (e.target.classList.contains('change-status-btn')) {
          const id = e.target.dataset.id;
          const newStatus = document.getElementById('statusSelect_' + id).value;
          const upd = appeals().map(a => a.id === id ? { ...a, status: newStatus } : a);
          store('tumix_appeals', upd);
          showToast('Статус изменён на ' + newStatus);
          document.getElementById('tabClientAppeals').click();
        }
        if (e.target.classList.contains('emp-change-status-btn')) {
          const emp = e.target.dataset.emp;
          const newStatus = document.getElementById('empStatusSelect_' + emp).value;
          const upd = empAppeals().map(a => a.empName === emp ? { ...a, status: newStatus } : a);
          store('tumix_emp_appeals', upd);
          showToast('Статус изменён на ' + newStatus);
          document.getElementById('tabEmpAppeals').click();
        }
        if (e.target.id === 'sendColleague') {
          const inp = document.getElementById('colleagueInput'); if (!inp.value.trim()) return;
          store('tumix_colleague_chats', [...colleagueChats(), { from: currentEmployee?.name, text: inp.value, timestamp: new Date().toISOString() }]);
          renderEmployeeView('colleagueChat');
        }
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && document.activeElement?.id === 'chatInput') { e.preventDefault(); document.getElementById('sendChat')?.click(); }
        if (e.key === 'Enter' && document.activeElement?.id === 'colleagueInput') { e.preventDefault(); document.getElementById('sendColleague')?.click(); }
      });

      if (!currentClient && !currentEmployee) renderAuth();
    })();
  </script>
</body>
</html>
